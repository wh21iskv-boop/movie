name: Обновление данных каталога

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v4
      
    - name: Устанавливаем Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Устанавливаем зависимости
      run: npm install axios
      
    - name: Обновляем постеры
      env:
        KINOPOISK_API_KEY: ${{ secrets.KINOPOISK_API_KEY }}
      run: node update_cache.js
      
    - name: Строим movies.json
      run: node build_cache.js
      
    - name: Сохраняем изменения
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add movies.json posters.json
        git commit -m "🤖 Автообновление каталога" || echo "Нет изменений"
        git push
