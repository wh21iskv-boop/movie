name: Ежедневное обновление кеша постеров

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-posters:
    runs-on: ubuntu-latest
    
    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v4
      
    - name: Устанавливаем Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Устанавливаем зависимости
      run: |
        npm init -y
        npm install node-fetch@3
      
    - name: Запускаем скрипт обновления кеша
      env:
        KINOPOISK_API_KEY: ${{ secrets.KINOPOISK_API_KEY }}
      run: node update_cache.js
      
    - name: Сохраняем изменения в репозитории
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add posters.json
        git commit -m "🤖 Автоматическое обновление кеша постеров" || echo "Нет изменений"
        git push
