<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #2d3561;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        select {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #2d3561;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            min-width: 150px;
        }
        
        select option {
            background: #1a1a2e;
        }
        
        .stats {
            text-align: right;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .movie-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.12);
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }
        
        .movie-title-original {
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .movie-detail {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-top: 5px;
        }
        
        .movie-label {
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.7);
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 15px;
            margin: 20px;
            color: #ff6b6b;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            border: 1px solid #2d3561;
        }
        
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
        }
        
        .close-modal:hover {
            color: #ff6b6b;
        }
        
        .modal h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 22px;
        }
        
        .modal-detail {
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #2d3561;
        }
        
        .modal-link {
            display: inline-block;
            margin-top: 10px;
            margin-right: 15px;
            color: #667eea;
            text-decoration: none;
        }
        
        .modal-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию, жанру, актерам, режиссеру...">
            <div class="filters">
                <select id="genreFilter">
                    <option value="">Все жанры</option>
                </select>
                <select id="yearFilter">
                    <option value="">Все годы</option>
                </select>
                <select id="countryFilter">
                    <option value="">Все страны</option>
                </select>
                <select id="actorFilter">
                    <option value="">Все актеры</option>
                </select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка каталога...
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ВАША ССЫЛКА
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJT3Ima7Qye4NmVPljMRk95erowQHWMDT9srmIFaQq-ErrUc3aAEyfhnE8rKmEhfjrc3xi96bqGcCJ/pub?output=csv';
        
        let allMovies = [];
        let uniqueGenres = new Set();
        let uniqueYears = new Set();
        let uniqueCountries = new Set();
        let uniqueActors = new Set();
        
        async function loadMovies() {
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Загрузка данных...');
                
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                const rows = parseCSV(csvText);
                console.log('Всего строк в CSV:', rows.length);
                
                if (rows.length < 2) throw new Error('Нет данных');
                
                // Показываем ВСЕ заголовки для отладки
                console.log('===== ЗАГОЛОВКИ КОЛОНОК =====');
                for (let i = 0; i < rows[0].length; i++) {
                    console.log(`Колонка ${i}: "${rows[0][i]}"`);
                }
                console.log('=============================');
                
                const headers = rows[0];
                
                // Функция поиска колонки по точному совпадению или частичному
                function findColumnIndex(names) {
                    for (let i = 0; i < headers.length; i++) {
                        const header = headers[i].toLowerCase().trim();
                        for (const name of names) {
                            if (header === name.toLowerCase() || header.includes(name.toLowerCase())) {
                                return i;
                            }
                        }
                    }
                    return -1;
                }
                
                // Ищем колонки по вашим названиям
                const colIndex = {
                    russianTitle: findColumnIndex(['Русское название', 'Название русское', 'Русский']),
                    originalTitle: findColumnIndex(['Оригинальное название', 'Название оригинальное', 'Оригинал', 'Original title']),
                    year: findColumnIndex(['Год выпуска', 'Год', 'Year']),
                    genre: findColumnIndex(['Жанр', 'Genre']),
                    country: findColumnIndex(['Страна', 'Country', 'Страны']),
                    director: findColumnIndex(['Режиссер', 'Режиссёр', 'Director']),
                    actors: findColumnIndex(['Актерский состав', 'Актеры', 'Actors', 'В ролях']),
                    ratingKP: findColumnIndex(['Оценка Кинопоиск', 'Кинопоиск', 'KP', 'Kinopoisk']),
                    ratingIMDb: findColumnIndex(['Оценка IMDb', 'IMDb', 'IMDB']),
                    description: findColumnIndex(['Описание', 'Description']),
                    kinopoiskLink: findColumnIndex(['Кинопоиск ссылка', 'Кинопоиск ссылка на фильм']),
                    kinoriumLink: findColumnIndex(['Кинориум ссылка на фильм', 'Кинориум']),
                    yandexFolder: findColumnIndex(['Папка на Яндексе', 'Яндекс', 'Yandex']),
                    duration: findColumnIndex(['Длительность', 'Duration']),
                    resolution: findColumnIndex(['Разрешение', 'Resolution']),
                    audioInfo: findColumnIndex(['Аудио информация', 'Аудио']),
                    subtitles: findColumnIndex(['Субтитры']),
                    fileSize: findColumnIndex(['Размер', 'Size']),
                    fileName: findColumnIndex(['Имя файла', 'Файл'])
                };
                
                console.log('Найденные индексы колонок:', colIndex);
                
                // Если не нашли русское название, используем оригинальное
                let titleIndex = colIndex.russianTitle;
                if (titleIndex === -1) {
                    titleIndex = colIndex.originalTitle;
                    console.log('Русское название не найдено, используем оригинальное');
                }
                
                // Если ничего не нашли, пробуем первую колонку
                if (titleIndex === -1 && headers.length > 0) {
                    titleIndex = 0;
                    console.log('Используем первую колонку как название');
                }
                
                // Парсим данные
                allMovies = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length === 0) continue;
                    
                    // Получаем название
                    let title = titleIndex !== -1 && titleIndex < row.length ? row[titleIndex]?.trim() : '';
                    
                    // Пропускаем строки без названия или со ссылками как названием
                    if (!title || title === 'kinopoisk.ru' || title.includes('http') || title === '—' || title === '-') {
                        continue;
                    }
                    
                    // Функция безопасного получения значения
                    const getVal = (idx) => idx !== -1 && idx < row.length ? row[idx]?.trim() || '' : '';
                    
                    const movie = {
                        russianTitle: title,
                        originalTitle: getVal(colIndex.originalTitle),
                        year: getVal(colIndex.year),
                        genre: getVal(colIndex.genre),
                        country: getVal(colIndex.country),
                        director: getVal(colIndex.director),
                        actors: getVal(colIndex.actors),
                        ratingKP: getVal(colIndex.ratingKP),
                        ratingIMDb: getVal(colIndex.ratingIMDb),
                        description: getVal(colIndex.description),
                        kinopoiskLink: getVal(colIndex.kinopoiskLink),
                        kinoriumLink: getVal(colIndex.kinoriumLink),
                        yandexFolder: getVal(colIndex.yandexFolder),
                        duration: getVal(colIndex.duration),
                        resolution: getVal(colIndex.resolution),
                        audioInfo: getVal(colIndex.audioInfo),
                        subtitles: getVal(colIndex.subtitles),
                        fileSize: getVal(colIndex.fileSize),
                        fileName: getVal(colIndex.fileName)
                    };
                    
                    allMovies.push(movie);
                    
                    // Собираем уникальные значения для фильтров
                    if (movie.genre) {
                        movie.genre.split(/[,;\/]/).forEach(g => {
                            const genre = g.trim();
                            if (genre && genre !== '—' && genre !== '-' && genre.length > 1) {
                                uniqueGenres.add(genre);
                            }
                        });
                    }
                    
                    if (movie.year) {
                        // Извлекаем год из даты (если есть)
                        let year = movie.year;
                        const yearMatch = movie.year.match(/\d{4}/);
                        if (yearMatch) year = yearMatch[0];
                        if (year && year !== '—' && year !== '-') {
                            uniqueYears.add(year);
                        }
                    }
                    
                    if (movie.country && movie.country !== '—' && movie.country !== '-') {
                        uniqueCountries.add(movie.country);
                    }
                    
                    if (movie.actors) {
                        movie.actors.split(/[,;]/).forEach(actor => {
                            const a = actor.trim();
                            if (a && a !== '—' && a !== '-' && a.length > 2) {
                                uniqueActors.add(a);
                            }
                        });
                    }
                }
                
                console.log('Загружено фильмов:', allMovies.length);
                console.log('Пример первого фильма:', allMovies[0]);
                
                if (allMovies.length === 0) {
                    throw new Error('Не найдено фильмов. Проверьте названия колонок в консоли.');
                }
                
                // Заполняем фильтры
                function populateFilter(selectId, valuesSet, sortByNumber = false) {
                    const select = document.getElementById(selectId);
                    let values = Array.from(valuesSet);
                    if (sortByNumber) {
                        values.sort((a, b) => {
                            const numA = parseInt(a);
                            const numB = parseInt(b);
                            if (!isNaN(numA) && !isNaN(numB)) return numB - numA;
                            return a.localeCompare(b);
                        });
                    } else {
                        values.sort();
                    }
                    values.forEach(value => {
                        select.innerHTML += `<option value="${escapeHtml(value)}">${escapeHtml(value.length > 50 ? value.substring(0, 50) + '...' : value)}</option>`;
                    });
                }
        
                document.getElementById('genreFilter').innerHTML = '<option value="">Все жанры</option>';
                document.getElementById('yearFilter').innerHTML = '<option value="">Все годы</option>';
                document.getElementById('countryFilter').innerHTML = '<option value="">Все страны</option>';
                document.getElementById('actorFilter').innerHTML = '<option value="">Все актеры</option>';
                
                populateFilter('genreFilter', uniqueGenres);
                populateFilter('yearFilter', uniqueYears, true);
                populateFilter('countryFilter', uniqueCountries);
                populateFilter('actorFilter', uniqueActors);
                
                displayMovies(allMovies);
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${escapeHtml(error.message)}<br><br>
                        <strong>Что делать:</strong><br>
                        1. Нажмите F12 и откройте вкладку Console<br>
                        2. Посмотрите список "ЗАГОЛОВКИ КОЛОНОК"<br>
                        3. Скопируйте сюда первую строку вашей таблицы (заголовки)
                    </div>
                `;
            }
        }
        
        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    if (char === '\r') i++;
                    currentRow.push(currentField);
                    if (currentRow.length > 0) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.length > 0) {
                    rows.push(currentRow);
                }
            }
            
            return rows;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function extractYear(dateStr) {
            if (!dateStr) return '';
            const match = dateStr.match(/\d{4}/);
            return match ? match[0] : dateStr;
        }
        
        function showMovieDetails(movie) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            let links = '';
            if (movie.kinopoiskLink && movie.kinopoiskLink.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.kinopoiskLink)}" target="_blank" class="modal-link">🎬 Кинопоиск</a>`;
            }
            if (movie.kinoriumLink && movie.kinoriumLink.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.kinoriumLink)}" target="_blank" class="modal-link">📽 Кинориум</a>`;
            }
            if (movie.yandexFolder && movie.yandexFolder.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.yandexFolder)}" target="_blank" class="modal-link">📁 Яндекс папка</a>`;
            }
            
            let detailsHtml = `<h3>${escapeHtml(movie.russianTitle)}</h3>`;
            if (movie.originalTitle && movie.originalTitle !== movie.russianTitle) {
                detailsHtml += `<div class="modal-detail"><span class="movie-label">Оригинальное название:</span> ${escapeHtml(movie.originalTitle)}</div>`;
            }
            if (movie.year) detailsHtml += `<div class="modal-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(extractYear(movie.year))}</div>`;
            if (movie.country) detailsHtml += `<div class="modal-detail"><span class="movie-label">🌍 Страна:</span> ${escapeHtml(movie.country)}</div>`;
            if (movie.genre) detailsHtml += `<div class="modal-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre)}</div>`;
            if (movie.director) detailsHtml += `<div class="modal-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director)}</div>`;
            if (movie.actors) detailsHtml += `<div class="modal-detail"><span class="movie-label">⭐ Актеры:</span> ${escapeHtml(movie.actors)}</div>`;
            
            let rating = '';
            if (movie.ratingKP) rating += `КП: ${movie.ratingKP} `;
            if (movie.ratingIMDb) rating += `IMDb: ${movie.ratingIMDb}`;
            if (rating) detailsHtml += `<div class="modal-detail"><span class="movie-label">📊 Рейтинг:</span> ${escapeHtml(rating)}</div>`;
            
            if (movie.description) detailsHtml += `<div class="modal-detail"><span class="movie-label">📖 Описание:</span> ${escapeHtml(movie.description)}</div>`;
            if (movie.duration) detailsHtml += `<div class="modal-detail"><span class="movie-label">⏱ Длительность:</span> ${escapeHtml(movie.duration)}</div>`;
            if (movie.resolution) detailsHtml += `<div class="modal-detail"><span class="movie-label">📺 Разрешение:</span> ${escapeHtml(movie.resolution)}</div>`;
            if (movie.fileSize) detailsHtml += `<div class="modal-detail"><span class="movie-label">💾 Размер:</span> ${escapeHtml(movie.fileSize)}</div>`;
            if (movie.audioInfo) detailsHtml += `<div class="modal-detail"><span class="movie-label">🔊 Аудио:</span> ${escapeHtml(movie.audioInfo)}</div>`;
            if (movie.subtitles) detailsHtml += `<div class="modal-detail"><span class="movie-label">📝 Субтитры:</span> ${escapeHtml(movie.subtitles)}</div>`;
            if (movie.fileName) detailsHtml += `<div class="modal-detail"><span class="movie-label">📁 Файл:</span> ${escapeHtml(movie.fileName)}</div>`;
            
            if (links) detailsHtml += `<div class="modal-detail"><span class="movie-label">🔗 Ссылки:</span><br>${links}</div>`;
            
            modalBody.innerHTML = detailsHtml;
            modal.style.display = 'flex';
        }
        
        function displayMovies(movies) {
            const contentDiv = document.getElementById('content');
            const statsDiv = document.getElementById('stats');
            
            statsDiv.innerHTML = `📊 Найдено: ${movies.length} фильмов`;
            
            if (movies.length === 0) {
                contentDiv.innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            const moviesHtml = `
                <div class="movies-grid">
                    ${movies.map(movie => `
                        <div class="movie-card" onclick='showMovieDetails(${JSON.stringify(movie).replace(/'/g, "\\'")})'>
                            <div class="movie-info">
                                <div class="movie-title">🎬 ${escapeHtml(movie.russianTitle.length > 60 ? movie.russianTitle.substring(0, 60) + '...' : movie.russianTitle)}</div>
                                ${movie.originalTitle && movie.originalTitle !== movie.russianTitle ? `<div class="movie-title-original">${escapeHtml(movie.originalTitle.length > 50 ? movie.originalTitle.substring(0, 50) + '...' : movie.originalTitle)}</div>` : ''}
                                <div class="movie-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(extractYear(movie.year) || '—')}</div>
                                <div class="movie-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre ? (movie.genre.length > 50 ? movie.genre.substring(0, 50) + '...' : movie.genre) : '—')}</div>
                                <div class="movie-detail"><span class="movie-label">⭐ Рейтинг:</span> ${escapeHtml(movie.ratingKP || movie.ratingIMDb || '—')}</div>
                                <div class="movie-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director ? (movie.director.length > 40 ? movie.director.substring(0, 40) + '...' : movie.director) : '—')}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            contentDiv.innerHTML = moviesHtml;
        }
        
        function filterMovies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedGenre = document.getElementById('genreFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            const selectedCountry = document.getElementById('countryFilter').value;
            const selectedActor = document.getElementById('actorFilter').value;
            
            const filtered = allMovies.filter(movie => {
                const searchFields = [
                    movie.russianTitle,
                    movie.originalTitle,
                    movie.genre,
                    movie.actors,
                    movie.director,
                    movie.description,
                    movie.country
                ].join(' ').toLowerCase();
                
                const matchesSearch = !searchTerm || searchFields.includes(searchTerm);
                
                let matchesGenre = !selectedGenre;
                if (selectedGenre && !matchesGenre) {
                    const movieGenres = (movie.genre || '').split(/[,;\/]/).map(g => g.trim());
                    matchesGenre = movieGenres.includes(selectedGenre);
                }
                
                const movieYear = extractYear(movie.year);
                const matchesYear = !selectedYear || movieYear === selectedYear;
                
                const matchesCountry = !selectedCountry || (movie.country || '').includes(selectedCountry);
                
                let matchesActor = !selectedActor;
                if (selectedActor && !matchesActor) {
                    const movieActors = (movie.actors || '').split(/[,;]/).map(a => a.trim());
                    matchesActor = movieActors.some(actor => actor.includes(selectedActor));
                }
                
                return matchesSearch && matchesGenre && matchesYear && matchesCountry && matchesActor;
            });
            
            displayMovies(filtered);
        }
        
        // Обработчики
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterMovies, 300);
        });
        document.getElementById('genreFilter').addEventListener('change', filterMovies);
        document.getElementById('yearFilter').addEventListener('change', filterMovies);
        document.getElementById('countryFilter').addEventListener('change', filterMovies);
        document.getElementById('actorFilter').addEventListener('change', filterMovies);
        
        // Модальное окно
        const modal = document.getElementById('modal');
        document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target === modal) modal.style.display = 'none';
        };
        
        loadMovies();
    </script>
</body>
</html>
