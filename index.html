<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <link href="https://unpkg.com" rel="stylesheet" />
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; background-color: #f3f4f6; }
        .container { max-width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #1f2937; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Интерактивный каталог (Данные обновляются из Google)</h2>
    <div id="table-container"></div>
</div>

<script src="https://cloudflare.com"></script>
<script src="https://unpkg.com"></script>
<script>
    // ВСТАВЬТЕ СЮДА ВАШУ ССЫЛКУ МЕЖДУ КАВЫЧКАМИ:
    const gsheetUrl = "https://docs.google.com/spreadsheets/d/11eaKYcUOU6R7xIUMQ8fXZXY_RgA4GDKrJnTGJ5nMhXo/export?format=csv";

    Papa.parse(gsheetUrl, {
        download: true, // Говорим парсеру скачать файл самостоятельно по ссылке
        skipEmptyLines: true,
        complete: function(results) {
            const rows = results.data;
            if (rows.length === 0) return;

            new gridjs.Grid({
                columns: rows[0], // Берем первую строчку как заголовки
                data: rows.slice(1), // Все остальные строчки как данные
                search: true,
                sort: true,
                pagination: { limit: 25 },
                language: {
                    'search': { 'placeholder': 'Поиск по каталогу...' },
                    'pagination': { 'previous': '◀', 'next': '▶', 'showing': 'Показано', 'to': 'из', 'of': 'всего', 'results': 'записей' }
                }
            }).render(document.getElementById("table-container"));
        }
    });
</script>
</body>
</html>
