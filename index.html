<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
        }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .random-btn, .sort-select {
            background: #58a6ff;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .sort-select {
            background: #161b22;
            border: 1px solid #3d444d;
            color: #e6edf3;
        }
        
        .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input, select {
            background: #161b22;
            border: 1px solid #3d444d;
            color: #e6edf3;
            padding: 8px 15px;
            border-radius: 25px;
        }
        input { width: 250px; }
        
        .stats { text-align: center; margin-bottom: 20px; color: #8d96a0; font-size: 14px; }
        .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); background: #1f2428; }
        .title { font-weight: bold; color: #58a6ff; }
        .year { font-size: 12px; color: #8d96a0; margin-top: 5px; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .pagination button {
            background: #58a6ff;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .pagination button:disabled { opacity: 0.5; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #161b22;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .close { float: right; cursor: pointer; font-size: 24px; }
        .detail-line { margin: 10px 0; padding: 5px 0; border-bottom: 1px solid #21262d; }
        .detail-label { color: #58a6ff; font-weight: bold; }
        
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #161b22;
            border: 1px solid #3d444d;
            cursor: pointer;
            font-size: 22px;
            z-index: 100;
        }
        
        body.light {
            background: #f6f8fa;
            color: #1f2328;
        }
        body.light .card { background: #ffffff; }
        body.light .card:hover { background: #f0f3f5; }
        body.light .modal-content { background: #ffffff; }
        body.light input, body.light select, body.light .sort-select { background: #ffffff; color: #1f2328; border-color: #d0d7de; }
        body.light .theme-toggle { background: #ffffff; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    
    <h1>🎬 Каталог медиафайлов</h1>
    
    <div class="top-bar">
        <select id="sortSelect" class="sort-select">
            <option value="default">📊 По умолчанию</option>
            <option value="year_asc">📅 Год (старые → новые)</option>
            <option value="year_desc">📅 Год (новые → старые)</option>
            <option value="title_asc">🔤 Название (А → Я)</option>
            <option value="title_desc">🔤 Название (Я → А)</option>
        </select>
        <button class="random-btn" id="randomBtn">🎲 Случайный фильм</button>
    </div>
    
    <div class="filters">
        <input type="text" id="search" placeholder="🔍 Поиск по названию, актёрам, режиссёру...">
        <select id="genre"><option value="">Все жанры</option></select>
        <select id="year"><option value="">Все годы</option></select>
        <select id="country"><option value="">Все страны</option></select>
        <select id="actor"><option value="">Все актеры</option></select>
    </div>
    
    <div class="stats" id="stats">Загрузка...</div>
    <div id="movies" class="movies"></div>
    <div id="pagination" class="pagination"></div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let movies = [];
        let filtered = [];
        let page = 1;
        let currentSort = 'default';
        const perPage = 40;
        
        // Тема
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
        
        // Сортировка
        function sortMovies(arr) {
            const sorted = [...arr];
            switch(currentSort) {
                case 'year_asc': sorted.sort((a,b) => (parseInt(a.year)||0) - (parseInt(b.year)||0)); break;
                case 'year_desc': sorted.sort((a,b) => (parseInt(b.year)||0) - (parseInt(a.year)||0)); break;
                case 'title_asc': sorted.sort((a,b) => a.title.localeCompare(b.title)); break;
                case 'title_desc': sorted.sort((a,b) => b.title.localeCompare(a.title)); break;
                default: break;
            }
            return sorted;
        }
        
        async function load() {
            try {
                const res = await fetch('./movies.json');
                const data = await res.json();
                movies = data.movies;
                
                // Заполняем фильтры
                const genres = new Set();
                const years = new Set();
                const countries = new Set();
                const actors = new Set();
                
                for (let m of movies) {
                    if (m.genre) m.genre.split(/[,/]/).forEach(g => { if(g && g.trim()) genres.add(g.trim()); });
                    if (m.year && m.year !== '—') years.add(m.year);
                    if (m.country && m.country !== '—') countries.add(m.country);
                    if (m.actors) m.actors.split(/[,;]/).forEach(a => { if(a && a.trim() && a.length > 2) actors.add(a.trim()); });
                }
                
                const genreSel = document.getElementById('genre');
                const yearSel = document.getElementById('year');
                const countrySel = document.getElementById('country');
                const actorSel = document.getElementById('actor');
                
                genreSel.innerHTML = '<option value="">Все жанры</option>';
                yearSel.innerHTML = '<option value="">Все годы</option>';
                countrySel.innerHTML = '<option value="">Все страны</option>';
                actorSel.innerHTML = '<option value="">Все актеры</option>';
                
                [...genres].sort().forEach(g => genreSel.innerHTML += `<option value="${escape(g)}">${escape(g).substring(0, 45)}</option>`);
                [...years].sort((a,b)=>parseInt(b)-parseInt(a)).forEach(y => yearSel.innerHTML += `<option value="${y}">${y}</option>`);
                [...countries].sort().forEach(c => countrySel.innerHTML += `<option value="${escape(c)}">${escape(c).substring(0, 45)}</option>`);
                [...actors].sort().forEach(a => actorSel.innerHTML += `<option value="${escape(a)}">${escape(a).substring(0, 45)}</option>`);
                
                filtered = [...movies];
                applyFilter();
                
            } catch(e) {
                document.getElementById('stats').innerHTML = 'Ошибка: ' + e.message;
            }
        }
        
        function applyFilter() {
            const search = document.getElementById('search').value.toLowerCase();
            const genre = document.getElementById('genre').value;
            const year = document.getElementById('year').value;
            const country = document.getElementById('country').value;
            const actor = document.getElementById('actor').value;
            
            let result = movies.filter(m => {
                const searchFields = [m.title, m.originalTitle, m.genre, m.actors, m.director, m.country].join(' ').toLowerCase();
                if (search && !searchFields.includes(search)) return false;
                if (genre && !(m.genre || '').includes(genre)) return false;
                if (year && m.year !== year) return false;
                if (country && !(m.country || '').includes(country)) return false;
                if (actor && !(m.actors || '').includes(actor)) return false;
                return true;
            });
            
            filtered = sortMovies(result);
            page = 1;
            render();
        }
        
        function render() {
            const start = (page-1)*perPage;
            const pageMovies = filtered.slice(start, start+perPage);
            const totalPages = Math.ceil(filtered.length / perPage);
            
            document.getElementById('stats').innerHTML = `🎬 ${filtered.length} из ${movies.length} фильмов | Стр. ${page} из ${totalPages || 1}`;
            
            if (pageMovies.length === 0) {
                document.getElementById('movies').innerHTML = '<div style="text-align:center">😔 Ничего не найдено</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let m of pageMovies) {
                html += `
                    <div class="card" onclick="show(${movies.findIndex(x=>x.id===m.id)})">
                        <div class="title">${escape(m.title).substring(0, 60)}</div>
                        <div class="year">📅 ${m.year || '—'} | 🎬 ${(m.director || '—').substring(0, 40)}</div>
                        <div class="year">🎭 ${(m.genre || '—').substring(0, 60)}</div>
                    </div>
                `;
            }
            document.getElementById('movies').innerHTML = html;
            
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml = `<button onclick="go(${page-1})" ${page===1?'disabled':''}>◀ Назад</button>`;
                pagHtml += `<span style="margin:0 15px">${page} / ${totalPages}</span>`;
                pagHtml += `<button onclick="go(${page+1})" ${page===totalPages?'disabled':''}>Вперед ▶</button>`;
            }
            document.getElementById('pagination').innerHTML = pagHtml;
            window.scrollTo({ top: 0 });
        }
        
        function go(p) { page = p; render(); }
        
        document.getElementById('randomBtn').addEventListener('click', () => {
            if (filtered.length === 0) return;
            const rand = Math.floor(Math.random() * filtered.length);
            const idx = movies.findIndex(x => x.id === filtered[rand].id);
            show(idx);
        });
        
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            applyFilter();
        });
        
        window.show = function(idx) {
            const m = movies[idx];
            if (!m) return;
            let html = `<h3>${escape(m.title)}</h3>`;
            if (m.originalTitle) html += `<div class="detail-line"><span class="detail-label">Оригинал:</span> ${escape(m.originalTitle)}</div>`;
            if (m.year) html += `<div class="detail-line"><span class="detail-label">Год:</span> ${m.year}</div>`;
            if (m.country) html += `<div class="detail-line"><span class="detail-label">Страна:</span> ${escape(m.country)}</div>`;
            if (m.genre) html += `<div class="detail-line"><span class="detail-label">Жанр:</span> ${escape(m.genre)}</div>`;
            if (m.director) html += `<div class="detail-line"><span class="detail-label">Режиссер:</span> ${escape(m.director)}</div>`;
            if (m.actors) html += `<div class="detail-line"><span class="detail-label">Актеры:</span> ${escape(m.actors).substring(0, 300)}</div>`;
            if (m.description) html += `<div class="detail-line"><span class="detail-label">Описание:</span> ${escape(m.description)}</div>`;
            if (m.audioInfo) html += `<div class="detail-line"><span class="detail-label">Аудио:</span> ${escape(m.audioInfo).substring(0, 200)}</div>`;
            if (m.subtitles) html += `<div class="detail-line"><span class="detail-label">Субтитры:</span> ${escape(m.subtitles)}</div>`;
            if (m.kinopoiskLink && m.kinopoiskLink.startsWith('http')) {
                html += `<div class="detail-line"><a href="${escape(m.kinopoiskLink)}" target="_blank">🎬 Кинопоиск</a></div>`;
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        };
        
        function escape(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        document.getElementById('search').addEventListener('input', () => { setTimeout(applyFilter, 300); });
        document.getElementById('genre').addEventListener('change', applyFilter);
        document.getElementById('year').addEventListener('change', applyFilter);
        document.getElementById('country').addEventListener('change', applyFilter);
        document.getElementById('actor').addEventListener('change', applyFilter);
        document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
        
        load();
    </script>
</body>
</html>
