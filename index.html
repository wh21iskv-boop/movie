<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог фильмов</title>
    <link href="https://jsdelivr.net" rel="stylesheet" />
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 20px; background-color: #f3f4f6; }
        .container { max-width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1f2937; margin-bottom: 20px; font-size: 22px; }
        .gridjs-td { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gridjs-td:hover { white-space: normal; overflow: visible; background: #fff; position: relative; z-index: 99; }
    </style>
</head>
<body>

<div class="container">
    <h2>Каталог медиафайлов (Автообновление из Google Таблиц)</h2>
    <div id="table-container">Загрузка каталога, пожалуйста подождите...</div>
</div>

<script src="https://jsdelivr.net"></script>
<script src="https://jsdelivr.net"></script>

<script>
    window.onload = function() {
        const gsheetUrl = "https://google.com";

        Papa.parse(gsheetUrl, {
            download: true,
            skipEmptyLines: 'greedy',
            complete: function(results) {
                const rows = results.data;
                if (!rows || rows.length < 2) {
                    document.getElementById("table-container").innerText = "Таблица пуста или к ней нет доступа.";
                    return;
                }

                document.getElementById("table-container").innerHTML = "";

                new gridjs.Grid({
                    columns: rows[1], // Берем ВТОРУЮ строку таблицы как заголовки (Год, Название и т.д.)
                    data: rows.slice(2), // Данные начинаются с третьей строки
                    search: true,
                    sort: true,
                    resizable: true,
                    pagination: { limit: 25 },
                    language: {
                        'search': { 'placeholder': 'Поиск фильма или актера...' },
                        'pagination': { 'previous': '◀', 'next': '▶', 'showing': 'Показано', 'to': 'из', 'of': 'всего', 'results': 'фильмов' }
                    }
                }).render(document.getElementById("table-container"));
            },
            error: function(err) {
                document.getElementById("table-container").innerText = "Ошибка загрузки данных из Google.";
                console.error(err);
            }
        });
    };
</script>
</body>
</html>
