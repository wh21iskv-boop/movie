<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог медиафайлов</title>
    <link href="https://unpkg.com" rel="stylesheet" />
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f3f4f6; }
        .container { max-width: 100%; background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Интерактивный каталог (Данные обновляются из Google)</h2>
    <div id="table-container"></div>
</div>

<script src="https://cloudflare.com"></script>
<script src="https://unpkg.com"></script>
<script>
    async function init() {
        // Мы берем ту самую прямую ссылку на экспорт, которую вы успешно собрали в самом начале
        // Вставьте её целиком внутрь кавычек ниже:
        const gsheetUrl = "https://docs.google.com/spreadsheets/d/11eaKYcUOU6R7xIUMQ8fXZXY_RgA4GDKrJnTGJ5nMhXo/export?format=csv";

        const res = await fetch(gsheetUrl);
        const text = await res.text();
        
        Papa.parse(text, {
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const rows = results.data;
                new gridjs.Grid({
                    columns: rows[0],
                    data: rows.slice(1),
                    search: true,
                    sort: true,
                    pagination: { limit: 25 },
                    language: { 'search': { 'placeholder': 'Поиск...' } }
                }).render(document.getElementById("table-container"));
            }
        });
    }
    init();
</script>
</body>
</html>
