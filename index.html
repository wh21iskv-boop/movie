<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #eee;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #667eea; }
        .search-section { margin-bottom: 30px; }
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #2d3561;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }
        .filters { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        select {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #2d3561;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        .stats { text-align: right; margin-bottom: 20px; color: #b0b0b0; }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .movie-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .movie-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.12); }
        .movie-poster {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #2d3561;
        }
        .movie-poster-placeholder {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d3561;
            font-size: 48px;
        }
        .movie-info { padding: 15px; }
        .movie-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .movie-title-original { font-size: 13px; color: #8899aa; margin-bottom: 10px; }
        .movie-detail { font-size: 12px; color: #b0b0b0; margin-top: 5px; }
        .movie-label { color: #667eea; font-weight: bold; }
        .loading, .no-results { text-align: center; padding: 60px; font-size: 18px; color: #b0b0b0; }
        .error { text-align: center; padding: 40px; background: rgba(220,53,69,0.2); border-radius: 15px; color: #ff6b6b; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 15px;
        }
        .pagination button {
            padding: 8px 20px;
            border-radius: 25px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            border: 1px solid #667eea;
        }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 28px;
            color: #667eea;
        }
        .modal h3 { color: #667eea; margin-bottom: 15px; }
        .modal-detail { margin: 10px 0; padding: 8px; border-bottom: 1px solid #2d3561; }
        .modal-link { color: #667eea; text-decoration: none; margin-right: 15px; }
        .audio-line, .subtitle-line { display: block; padding: 4px 0 4px 20px; font-size: 12px; margin: 4px 0; }
        .audio-line { border-left: 2px solid #667eea; }
        .subtitle-line { border-left: 1px dashed #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск...">
            <div class="filters">
                <select id="genreFilter"><option value="">Все жанры</option></select>
                <select id="yearFilter"><option value="">Все годы</option></select>
                <select id="countryFilter"><option value="">Все страны</option></select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        <div id="content"><div class="loading"><div class="spinner"></div>Загрузка...</div></div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let filteredMovies = [];
        let currentPage = 1;
        const PER_PAGE = 50;
        
        async function loadMovies() {
            try {
                console.log('Загрузка movies.json...');
                const response = await fetch('./movies.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                allMovies = data.movies;
                console.log(`✅ Загружено ${allMovies.length} фильмов`);
                
                filteredMovies = [...allMovies];
                applyFilters();
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
            }
        }
        
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const year = document.getElementById('yearFilter').value;
            const country = document.getElementById('countryFilter').value;
            
            filteredMovies = allMovies.filter(m => {
                if (search && !m.title.toLowerCase().includes(search) && !(m.originalTitle || '').toLowerCase().includes(search)) return false;
                if (genre && !(m.genre || '').includes(genre)) return false;
                if (year && m.year !== year) return false;
                if (country && !(m.country || '').includes(country)) return false;
                return true;
            });
            
            currentPage = 1;
            renderMovies();
        }
        
        function renderMovies() {
            const start = (currentPage - 1) * PER_PAGE;
            const pageMovies = filteredMovies.slice(start, start + PER_PAGE);
            const totalPages = Math.ceil(filteredMovies.length / PER_PAGE);
            
            document.getElementById('stats').innerHTML = `📊 Найдено: ${filteredMovies.length} из ${allMovies.length} фильмов | Страница ${currentPage} из ${totalPages}`;
            
            if (pageMovies.length === 0) {
                document.getElementById('content').innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            let html = '<div class="movies-grid">';
            for (let m of pageMovies) {
                const origIndex = allMovies.findIndex(x => x.id === m.id);
                const posterHtml = m.posterUrl 
                    ? `<img class="movie-poster" src="${m.posterUrl}" onerror="this.parentElement.innerHTML='<div class=\'movie-poster-placeholder\'>🎬</div>'">`
                    : `<div class="movie-poster-placeholder">🎬</div>`;
                
                html += `
                    <div class="movie-card" onclick="showDetails(${origIndex})">
                        ${posterHtml}
                        <div class="movie-info">
                            <div class="movie-title">${escape(m.title)}</div>
                            ${m.originalTitle ? `<div class="movie-title-original">${escape(m.originalTitle)}</div>` : ''}
                            <div class="movie-detail"><span class="movie-label">📅 Год:</span> ${m.year || '—'}</div>
                            <div class="movie-detail"><span class="movie-label">🎭 Жанр:</span> ${(m.genre || '—').substring(0, 60)}</div>
                            <div class="movie-detail"><span class="movie-label">🎬 Режиссер:</span> ${(m.director || '—').substring(0, 40)}</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            
            if (totalPages > 1) {
                html += `
                    <div class="pagination">
                        <button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>◀ Назад</button>
                        <button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Вперед ▶</button>
                    </div>
                `;
            }
            
            document.getElementById('content').innerHTML = html;
            window.scrollTo({ top: 0 });
        }
        
        function goPage(page) {
            const total = Math.ceil(filteredMovies.length / PER_PAGE);
            if (page < 1 || page > total) return;
            currentPage = page;
            renderMovies();
        }
        
        window.showDetails = function(idx) {
            const m = allMovies[idx];
            if (!m) return;
            
            let links = '';
            if (m.kinopoiskLink && m.kinopoiskLink.startsWith('http')) links += `<a href="${escape(m.kinopoiskLink)}" target="_blank" class="modal-link">🎬 Кинопоиск</a>`;
            
            let rating = '';
            if (m.ratingKP) rating += `КП: ${m.ratingKP} `;
            if (m.ratingIMDb) rating += `IMDb: ${m.ratingIMDb}`;
            
            let html = `<h3>${escape(m.title)}</h3>`;
            if (m.originalTitle) html += `<div class="modal-detail"><span class="movie-label">Оригинал:</span> ${escape(m.originalTitle)}</div>`;
            if (m.year) html += `<div class="modal-detail"><span class="movie-label">📅 Год:</span> ${m.year}</div>`;
            if (m.country) html += `<div class="modal-detail"><span class="movie-label">🌍 Страна:</span> ${escape(m.country)}</div>`;
            if (m.genre) html += `<div class="modal-detail"><span class="movie-label">🎭 Жанр:</span> ${escape(m.genre)}</div>`;
            if (m.director) html += `<div class="modal-detail"><span class="movie-label">🎬 Режиссер:</span> ${escape(m.director)}</div>`;
            if (m.actors) html += `<div class="modal-detail"><span class="movie-label">⭐ Актеры:</span> ${escape(m.actors)}</div>`;
            if (rating) html += `<div class="modal-detail"><span class="movie-label">📊 Рейтинг:</span> ${escape(rating)}</div>`;
            if (m.description) html += `<div class="modal-detail"><span class="movie-label">📖 Описание:</span> ${escape(m.description)}</div>`;
            
            if (m.audioInfo && m.audioInfo !== '—') {
                let audioHtml = '<div class="modal-detail"><span class="movie-label">🔊 Аудио:</span><br>';
                const parts = m.audioInfo.split(/(?=Аудио #\d+)/);
                for (let a of parts) if (a.trim()) audioHtml += `<div class="audio-line">🎧 ${escape(a.trim())}</div>`;
                audioHtml += '</div>';
                html += audioHtml;
            }
            
            if (m.subtitles && m.subtitles !== '—') {
                let subHtml = '<div class="modal-detail"><span class="movie-label">📝 Субтитры:</span><br>';
                const parts = m.subtitles.split(/[,;]/);
                for (let s of parts) if (s.trim()) subHtml += `<div class="subtitle-line">📄 ${escape(s.trim())}</div>`;
                subHtml += '</div>';
                html += subHtml;
            }
            
            if (links) html += `<div class="modal-detail">${links}</div>`;
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        };
        
        function escape(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('genreFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('countryFilter').addEventListener('change', applyFilters);
        
        document.querySelector('.close-modal').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
        
        loadMovies();
    </script>
</body>
</html>
