<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #2d3561;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        
        #searchInput::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        select, .year-filter {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #2d3561;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        select option {
            background: #1a1a2e;
        }
        
        .stats {
            text-align: right;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .movie-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.12);
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }
        
        .movie-title-rus {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }
        
        .movie-detail {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-top: 5px;
        }
        
        .movie-label {
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.7);
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 15px;
            margin: 20px;
            color: #ff6b6b;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }
        
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #667eea;
        }
        
        .modal h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .modal-detail {
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #2d3561;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию, жанру, актерам, режиссеру...">
            <div class="filters">
                <select id="genreFilter">
                    <option value="">Все жанры</option>
                </select>
                <select id="yearFilter">
                    <option value="">Все годы</option>
                </select>
                <select id="countryFilter">
                    <option value="">Все страны</option>
                </select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка каталога...
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ⚠️ ВСТАВЬТЕ ВАШУ ССЫЛКУ ЗДЕСЬ ⚠️
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJT3Ima7Qye4NmVPljMRk95erowQHWMDT9srmIFaQq-ErrUc3aAEyfhnE8rKmEhfjrc3xi96bqGcCJ/pub?output=csv';
        
        let allMovies = [];
        let uniqueGenres = new Set();
        let uniqueYears = new Set();
        let uniqueCountries = new Set();
        
        // Индексы колонок (определятся автоматически)
        let colIndex = {};
        
        async function loadMovies() {
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Загрузка данных из:', GOOGLE_SHEET_CSV_URL);
                
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                
                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                if (csvText.length < 10) {
                    throw new Error('Файл пустой. Проверьте публикацию таблицы.');
                }
                
                // Парсим CSV
                const rows = parseCSV(csvText);
                console.log('Найдено строк:', rows.length);
                
                if (rows.length < 2) {
                    throw new Error('Нет данных. Первая строка должна содержать заголовки.');
                }
                
                // Определяем индексы колонок по заголовкам
                const headers = rows[0];
                console.log('Заголовки:', headers);
                
                // Маппинг русских заголовков
                colIndex = {
                    year: findColumn(headers, ['Год выпуска', 'Год', 'Year']),
                    originalTitle: findColumn(headers, ['Оригинальное название', 'Original title', 'Оригинал']),
                    russianTitle: findColumn(headers, ['Русское название', 'Название', 'Title', 'Русский']),
                    genre: findColumn(headers, ['Жанр', 'Genre']),
                    description: findColumn(headers, ['Описание', 'Description', 'Сюжет']),
                    kinoriumLink: findColumn(headers, ['Кинориум', 'Кинориум ссылка', 'Kinorium']),
                    kinopoiskLink: findColumn(headers, ['Кинопоиск', 'Кинопоиск ссылка', 'Kinopoisk']),
                    kinopoiskRating: findColumn(headers, ['Оценка Кинопоиск', 'КП оценка', 'Kinopoisk rating']),
                    imdbRating: findColumn(headers, ['Оценка IMDb', 'IMDb', 'IMDb rating']),
                    actors: findColumn(headers, ['Актерский состав', 'Актеры', 'Actors', 'В ролях']),
                    premiereDate: findColumn(headers, ['Дата премьеры', 'Премьера', 'Release date']),
                    country: findColumn(headers, ['Страна', 'Country', 'Страны']),
                    director: findColumn(headers, ['Режиссер', 'Director', 'Режиссёр']),
                    fileName: findColumn(headers, ['Имя файла', 'Файл', 'Filename']),
                    duration: findColumn(headers, ['Длительность', 'Duration', 'Время']),
                    size: findColumn(headers, ['Размер', 'Size', 'ГБ']),
                    resolution: findColumn(headers, ['Разрешение', 'Resolution', 'Quality']),
                    audioInfo: findColumn(headers, ['Аудио информация', 'Аудио', 'Audio']),
                    videoCodec: findColumn(headers, ['Видеокодек', 'Codec', 'Video']),
                    bitrate: findColumn(headers, ['Битрейт', 'Bitrate']),
                    subtitles: findColumn(headers, ['Субтитры', 'Subtitles']),
                    yandexFolder: findColumn(headers, ['Папка на Яндексе', 'Яндекс', 'Yandex', 'Папка'])
                };
                
                console.log('Найдены колонки:', colIndex);
                
                // Парсим данные
                allMovies = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const russianTitle = getValue(row, colIndex.russianTitle);
                    const originalTitle = getValue(row, colIndex.originalTitle);
                    
                    // Пропускаем пустые строки
                    if (!russianTitle && !originalTitle) continue;
                    
                    const movie = {
                        year: getValue(row, colIndex.year),
                        originalTitle: originalTitle,
                        russianTitle: russianTitle || originalTitle,
                        genre: getValue(row, colIndex.genre),
                        description: getValue(row, colIndex.description),
                        kinoriumLink: getValue(row, colIndex.kinoriumLink),
                        kinopoiskLink: getValue(row, colIndex.kinopoiskLink),
                        kinopoiskRating: getValue(row, colIndex.kinopoiskRating),
                        imdbRating: getValue(row, colIndex.imdbRating),
                        actors: getValue(row, colIndex.actors),
                        premiereDate: getValue(row, colIndex.premiereDate),
                        country: getValue(row, colIndex.country),
                        director: getValue(row, colIndex.director),
                        fileName: getValue(row, colIndex.fileName),
                        duration: getValue(row, colIndex.duration),
                        size: getValue(row, colIndex.size),
                        resolution: getValue(row, colIndex.resolution),
                        audioInfo: getValue(row, colIndex.audioInfo),
                        videoCodec: getValue(row, colIndex.videoCodec),
                        bitrate: getValue(row, colIndex.bitrate),
                        subtitles: getValue(row, colIndex.subtitles),
                        yandexFolder: getValue(row, colIndex.yandexFolder)
                    };
                    
                    allMovies.push(movie);
                    
                    // Собираем уникальные значения для фильтров
                    if (movie.genre) {
                        movie.genre.split(/[,;\/]/).forEach(g => {
                            const genre = g.trim();
                            if (genre && genre !== '—' && genre !== '-') {
                                uniqueGenres.add(genre);
                            }
                        });
                    }
                    
                    if (movie.year && movie.year !== '—' && movie.year !== '-') {
                        uniqueYears.add(movie.year);
                    }
                    
                    if (movie.country && movie.country !== '—' && movie.country !== '-') {
                        uniqueCountries.add(movie.country);
                    }
                }
                
                console.log('Загружено фильмов:', allMovies.length);
                
                if (allMovies.length === 0) {
                    throw new Error('Не найдено фильмов. Проверьте структуру таблицы.');
                }
                
                // Заполняем фильтры
                populateFilter('genreFilter', uniqueGenres);
                populateFilter('yearFilter', uniqueYears, true);
                populateFilter('countryFilter', uniqueCountries);
                
                displayMovies(allMovies);
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Ошибка загрузки данных<br><br>
                        ${escapeHtml(error.message)}<br><br>
                        <strong>Проверьте:</strong><br>
                        • Таблица опубликована (Файл → Опубликовать в интернете)<br>
                        • Ссылка правильная (заканчивается на /pub?output=csv)<br>
                        • Первая строка содержит заголовки<br>
                        • В таблице есть данные
                    </div>
                `;
            }
        }
        
        function getValue(row, index) {
            if (index === -1 || index >= row.length) return '';
            return row[index]?.trim() || '';
        }
        
        function findColumn(headers, possibleNames) {
            for (let i = 0; i < headers.length; i++) {
                const header = headers[i].toLowerCase().trim();
                for (const name of possibleNames) {
                    if (header.includes(name.toLowerCase())) {
                        return i;
                    }
                }
            }
            return -1;
        }
        
        function populateFilter(filterId, valuesSet, sortAsNumbers = false) {
            const select = document.getElementById(filterId);
            let values = Array.from(valuesSet);
            
            if (sortAsNumbers) {
                values.sort((a, b) => {
                    const numA = parseInt(a);
                    const numB = parseInt(b);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    return a.localeCompare(b);
                });
            } else {
                values.sort();
            }
            
            values.forEach(value => {
                if (value && value !== '—' && value !== '-' && value !== 'Не указан') {
                    select.innerHTML += `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`;
                }
            });
        }
        
        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    if (char === '\r') i++;
                    currentRow.push(currentField);
                    if (currentRow.length > 0 && !(currentRow.length === 1 && currentRow[0] === '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.length > 0 && !(currentRow.length === 1 && currentRow[0] === '')) {
                    rows.push(currentRow);
                }
            }
            
            return rows;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMovieDetails(movie) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            let links = '';
            if (movie.kinopoiskLink && movie.kinopoiskLink.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.kinopoiskLink)}" target="_blank" style="color:#667eea; margin-right:15px;">🎬 Кинопоиск</a>`;
            }
            if (movie.kinoriumLink && movie.kinoriumLink.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.kinoriumLink)}" target="_blank" style="color:#667eea;">📽 Кинориум</a>`;
            }
            if (movie.yandexFolder && movie.yandexFolder.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.yandexFolder)}" target="_blank" style="color:#667eea; margin-left:15px;">📁 Яндекс Папка</a>`;
            }
            
            modalBody.innerHTML = `
                <h3>${escapeHtml(movie.russianTitle)}</h3>
                ${movie.originalTitle ? `<div class="modal-detail"><span class="movie-label">Оригинальное название:</span> ${escapeHtml(movie.originalTitle)}</div>` : ''}
                ${movie.year ? `<div class="modal-detail"><span class="movie-label">Год:</span> ${escapeHtml(movie.year)}</div>` : ''}
                ${movie.country ? `<div class="modal-detail"><span class="movie-label">Страна:</span> ${escapeHtml(movie.country)}</div>` : ''}
                ${movie.genre ? `<div class="modal-detail"><span class="movie-label">Жанр:</span> ${escapeHtml(movie.genre)}</div>` : ''}
                ${movie.director ? `<div class="modal-detail"><span class="movie-label">Режиссер:</span> ${escapeHtml(movie.director)}</div>` : ''}
                ${movie.actors ? `<div class="modal-detail"><span class="movie-label">Актеры:</span> ${escapeHtml(movie.actors)}</div>` : ''}
                ${movie.description ? `<div class="modal-detail"><span class="movie-label">Описание:</span> ${escapeHtml(movie.description)}</div>` : ''}
                ${movie.kinopoiskRating ? `<div class="modal-detail"><span class="movie-label">Кинопоиск:</span> ⭐ ${escapeHtml(movie.kinopoiskRating)}</div>` : ''}
                ${movie.imdbRating ? `<div class="modal-detail"><span class="movie-label">IMDb:</span> ⭐ ${escapeHtml(movie.imdbRating)}</div>` : ''}
                ${movie.duration ? `<div class="modal-detail"><span class="movie-label">Длительность:</span> ${escapeHtml(movie.duration)}</div>` : ''}
                ${movie.size ? `<div class="modal-detail"><span class="movie-label">Размер:</span> ${escapeHtml(movie.size)} ГБ</div>` : ''}
                ${movie.resolution ? `<div class="modal-detail"><span class="movie-label">Разрешение:</span> ${escapeHtml(movie.resolution)}</div>` : ''}
                ${movie.audioInfo ? `<div class="modal-detail"><span class="movie-label">Аудио:</span> ${escapeHtml(movie.audioInfo)}</div>` : ''}
                ${movie.subtitles ? `<div class="modal-detail"><span class="movie-label">Субтитры:</span> ${escapeHtml(movie.subtitles)}</div>` : ''}
                ${movie.fileName ? `<div class="modal-detail"><span class="movie-label">Файл:</span> ${escapeHtml(movie.fileName)}</div>` : ''}
                ${links ? `<div class="modal-detail"><span class="movie-label">Ссылки:</span><br>${links}</div>` : ''}
            `;
            
            modal.style.display = 'flex';
        }
        
        function displayMovies(movies) {
            const contentDiv = document.getElementById('content');
            const statsDiv = document.getElementById('stats');
            
            statsDiv.innerHTML = `📊 Найдено: ${movies.length} фильмов`;
            
            if (movies.length === 0) {
                contentDiv.innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            const moviesHtml = `
                <div class="movies-grid">
                    ${movies.map(movie => `
                        <div class="movie-card" onclick="showMovieDetails(${JSON.stringify(movie).replace(/</g, '\\u003c')})">
                            <div class="movie-info">
                                <div class="movie-title">🎬 ${escapeHtml(movie.russianTitle)}</div>
                                ${movie.originalTitle ? `<div class="movie-title-rus">${escapeHtml(movie.originalTitle)}</div>` : ''}
                                <div class="movie-detail">
                                    <span class="movie-label">📅 Год:</span> ${escapeHtml(movie.year || '—')}
                                </div>
                                <div class="movie-detail">
                                    <span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre && movie.genre.length > 50 ? movie.genre.substring(0, 50) + '...' : movie.genre || '—')}
                                </div>
                                <div class="movie-detail">
                                    <span class="movie-label">⭐ Рейтинг:</span> ${escapeHtml(movie.kinopoiskRating || movie.imdbRating || '—')}
                                </div>
                                <div class="movie-detail">
                                    <span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director && movie.director.length > 40 ? movie.director.substring(0, 40) + '...' : movie.director || '—')}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            contentDiv.innerHTML = moviesHtml;
        }
        
        function filterMovies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedGenre = document.getElementById('genreFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            const selectedCountry = document.getElementById('countryFilter').value;
            
            const filtered = allMovies.filter(movie => {
                const searchFields = [
                    movie.russianTitle,
                    movie.originalTitle,
                    movie.genre,
                    movie.actors,
                    movie.director,
                    movie.description
                ].join(' ').toLowerCase();
                
                const matchesSearch = !searchTerm || searchFields.includes(searchTerm);
                
                let matchesGenre = !selectedGenre;
                if (selectedGenre && !matchesGenre) {
                    const movieGenres = (movie.genre || '').split(/[,;\/]/).map(g => g.trim());
                    matchesGenre = movieGenres.includes(selectedGenre);
                }
                
                const matchesYear = !selectedYear || movie.year === selectedYear;
                const matchesCountry = !selectedCountry || (movie.country || '').includes(selectedCountry);
                
                return matchesSearch && matchesGenre && matchesYear && matchesCountry;
            });
            
            displayMovies(filtered);
        }
        
        // Обработчики событий
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterMovies, 300);
        });
        
        document.getElementById('genreFilter').addEventListener('change', filterMovies);
        document.getElementById('yearFilter').addEventListener('change', filterMovies);
        document.getElementById('countryFilter').addEventListener('change', filterMovies);
        
        // Модальное окно
        const modal = document.getElementById('modal');
        document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target === modal) modal.style.display = 'none';
        };
        
        // Запуск
        loadMovies();
    </script>
</body>
</html>
