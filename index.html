<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Анимированный заголовок */
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Улучшенный поиск */
        .search-section {
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #2d3561;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Фильтры */
        .filters {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        select {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #2d3561;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            min-width: 150px;
            transition: all 0.3s;
        }
        
        select:hover {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        
        select option {
            background: #1a1a2e;
        }
        
        /* Счетчик */
        .stats {
            text-align: right;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: inline-block;
            float: right;
        }
        
        /* Сетка фильмов */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            clear: both;
            animation: fadeInUp 0.6s ease;
        }
        
        /* Карточка фильма с улучшенной анимацией */
        .movie-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        
        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        
        .movie-card:hover::before {
            left: 100%;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.12);
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: white;
        }
        
        .movie-title-original {
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .movie-detail {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-top: 5px;
        }
        
        .movie-label {
            color: #667eea;
            font-weight: bold;
        }
        
        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.7);
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 15px;
            margin: 20px;
            color: #ff6b6b;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        /* Модальное окно - улучшенное */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1e1e3a 0%, #1a1a2e 100%);
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideInUp 0.3s ease;
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .close-modal:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }
        
        .modal h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 24px;
            border-left: 3px solid #667eea;
            padding-left: 15px;
        }
        
        .modal-detail {
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #2d3561;
            transition: background 0.2s;
        }
        
        .modal-detail:hover {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
        }
        
        .modal-detail:last-child {
            border-bottom: none;
        }
        
        .modal-link {
            display: inline-block;
            margin-top: 10px;
            margin-right: 15px;
            color: #667eea;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .modal-link:hover {
            background: rgba(102, 126, 234, 0.2);
            text-decoration: none;
            transform: translateY(-2px);
        }
        
        /* Аудио дорожки */
        .audio-line {
            display: block;
            padding: 5px 0 5px 20px;
            font-size: 12px;
            color: #b0b0b0;
            border-left: 2px solid #667eea;
            margin: 5px 0;
            transition: all 0.2s;
        }
        
        .audio-line:hover {
            border-left-color: #ff6b6b;
            padding-left: 25px;
        }
        
        /* Субтитры - КАЖДЫЙ С НОВОЙ СТРОКИ */
        .subtitle-line {
            display: block;
            padding: 4px 0 4px 20px;
            font-size: 12px;
            color: #b0b0b0;
            border-left: 1px dashed #667eea;
            margin: 4px 0;
        }
        
        /* Счетчик результатов */
        .result-badge {
            background: rgba(102, 126, 234, 0.3);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        
        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию, жанру, актерам, режиссеру...">
            <div class="filters">
                <select id="genreFilter">
                    <option value="">🎭 Все жанры</option>
                </select>
                <select id="yearFilter">
                    <option value="">📅 Все годы</option>
                </select>
                <select id="countryFilter">
                    <option value="">🌍 Все страны</option>
                </select>
                <select id="actorFilter">
                    <option value="">⭐ Все актеры</option>
                </select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка каталога...
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJT3Ima7Qye4NmVPljMRk95erowQHWMDT9srmIFaQq-ErrUc3aAEyfhnE8rKmEhfjrc3xi96bqGcCJ/pub?output=csv';
        
        let allMovies = [];
        let uniqueGenres = new Set();
        let uniqueYears = new Set();
        let uniqueCountries = new Set();
        let uniqueActors = new Set();
        
        window.showMovieDetails = function(index) {
            const movie = allMovies[index];
            if (!movie) {
                console.error('Фильм не найден, индекс:', index);
                return;
            }
            
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            let links = '';
            if (movie.kinopoiskLink && movie.kinopoiskLink.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.kinopoiskLink)}" target="_blank" class="modal-link">🎬 Кинопоиск</a>`;
            }
            if (movie.yandexFolder && movie.yandexFolder.startsWith('http')) {
                links += `<a href="${escapeHtml(movie.yandexFolder)}" target="_blank" class="modal-link">📁 Яндекс папка</a>`;
            }
            
            let rating = '';
            if (movie.ratingKP && movie.ratingKP !== '—') rating += `КП: ${movie.ratingKP} `;
            if (movie.ratingIMDb && movie.ratingIMDb !== '—') rating += `IMDb: ${movie.ratingIMDb}`;
            
            let detailsHtml = `<h3>${escapeHtml(movie.russianTitle)}</h3>`;
            
            if (movie.originalTitle && movie.originalTitle !== movie.russianTitle) {
                detailsHtml += `<div class="modal-detail"><span class="movie-label">🎬 Оригинальное название:</span> ${escapeHtml(movie.originalTitle)}</div>`;
            }
            if (movie.year) detailsHtml += `<div class="modal-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(extractYear(movie.year))}</div>`;
            if (movie.country && movie.country !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">🌍 Страна:</span> ${escapeHtml(movie.country)}</div>`;
            if (movie.genre && movie.genre !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre)}</div>`;
            if (movie.director && movie.director !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director)}</div>`;
            if (movie.actors && movie.actors !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">⭐ Актеры:</span> ${escapeHtml(movie.actors)}</div>`;
            if (rating) detailsHtml += `<div class="modal-detail"><span class="movie-label">📊 Рейтинг:</span> <span class="result-badge">${escapeHtml(rating)}</span></div>`;
            if (movie.description && movie.description !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">📖 Описание:</span> ${escapeHtml(movie.description)}</div>`;
            
            if (movie.duration && movie.duration !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">⏱ Длительность:</span> ${escapeHtml(movie.duration)}</div>`;
            if (movie.resolution && movie.resolution !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">📺 Разрешение:</span> ${escapeHtml(movie.resolution)}</div>`;
            if (movie.size && movie.size !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">💾 Размер:</span> ${escapeHtml(movie.size)} ГБ</div>`;
            
            // Аудио дорожки
            if (movie.audioInfo && movie.audioInfo.length > 0) {
                let audioHtml = '<div class="modal-detail"><span class="movie-label">🔊 Аудио дорожки:</span><br>';
                for (const audio of movie.audioInfo) {
                    if (audio && audio !== '—') {
                        audioHtml += `<span class="audio-line">${escapeHtml(audio)}</span>`;
                    }
                }
                audioHtml += '</div>';
                detailsHtml += audioHtml;
            }
            
            // Субтитры - КАЖДЫЙ С НОВОЙ СТРОКИ (исправлено!)
            if (movie.subtitles && movie.subtitles.length > 0) {
                let subsHtml = '<div class="modal-detail"><span class="movie-label">📝 Субтитры:</span><br>';
                for (const sub of movie.subtitles) {
                    if (sub && sub !== '—') {
                        subsHtml += `<span class="subtitle-line">📄 ${escapeHtml(sub)}</span>`;
                    }
                }
                subsHtml += '</div>';
                detailsHtml += subsHtml;
            }
            
            if (movie.fileName && movie.fileName !== '—') detailsHtml += `<div class="modal-detail"><span class="movie-label">📁 Файл:</span> <code style="font-size:11px">${escapeHtml(movie.fileName)}</code></div>`;
            if (links) detailsHtml += `<div class="modal-detail"><span class="movie-label">🔗 Ссылки:</span><br>${links}</div>`;
            
            modalBody.innerHTML = detailsHtml;
            modal.style.display = 'flex';
        };
        
        async function loadMovies() {
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Загрузка данных...');
                
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                const rows = parseCSV(csvText);
                console.log('Всего строк в CSV:', rows.length);
                
                if (rows.length < 2) throw new Error('Нет данных');
                
                const headers = rows[0];
                console.log('Заголовки:', headers);
                
                function findCol(names) {
                    for (let i = 0; i < headers.length; i++) {
                        const h = headers[i] || '';
                        for (const name of names) {
                            if (h.toLowerCase().includes(name.toLowerCase())) {
                                return i;
                            }
                        }
                    }
                    return -1;
                }
                
                const yearIndex = findCol(['Год выпуска', 'Год']);
                const originalTitleIndex = findCol(['Оригинальное название', 'Оригинал']);
                const russianTitleIndex = findCol(['Русское название', 'Название русское']);
                const genreIndex = findCol(['Жанр']);
                const descriptionIndex = findCol(['Описание']);
                const kinopoiskLinkIndex = findCol(['Киноопись', 'ссылка']);
                const ratingKPIndex = findCol(['Оценка Киноискусства', 'Киноискусства']);
                const ratingIMDbIndex = findCol(['Оценка ИМДБ', 'IMDb', 'ИМДБ']);
                const actorsIndex = findCol(['Актерский фестиваль', 'Актеры']);
                const countryIndex = findCol(['Страна']);
                const directorIndex = findCol(['Режиссёр', 'Режиссер']);
                const fileNameIndex = findCol(['Имя файла', 'Файл']);
                const durationIndex = findCol(['Длительность']);
                const sizeIndex = findCol(['Размер']);
                const resolutionIndex = findCol(['Разрешение']);
                const audioIndex = findCol(['Аудио информация', 'Аудио']);
                const subtitlesIndex = findCol(['Субтитр', 'Субтитры']);
                const yandexIndex = findCol(['Папка на Яндекс', 'Яндекс']);
                
                allMovies = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;
                    
                    const getVal = (idx) => {
                        if (idx === -1 || idx >= row.length) return '';
                        const val = row[idx];
                        return (val && val !== 'null' && val !== 'undefined') ? String(val).trim() : '';
                    };
                    
                    const russianTitle = getVal(russianTitleIndex);
                    const originalTitle = getVal(originalTitleIndex);
                    
                    let displayTitle = russianTitle;
                    let displayOriginal = originalTitle;
                    
                    if (!displayTitle && displayOriginal) {
                        displayTitle = displayOriginal;
                        displayOriginal = '';
                    }
                    
                    if (!displayTitle) continue;
                    if (displayTitle === '—' || displayTitle === '-') continue;
                    if (displayTitle.includes('http')) continue;
                    
                    let ratingKP = getVal(ratingKPIndex);
                    if (ratingKP && (ratingKP.includes('kinopoisk') || ratingKP.includes('http'))) {
                        const match = ratingKP.match(/(\d+[,.]?\d*)/);
                        ratingKP = match ? match[1].replace(',', '.') : '';
                    }
                    if (ratingKP === '—' || ratingKP === '-') ratingKP = '';
                    
                    let ratingIMDb = getVal(ratingIMDbIndex);
                    if (ratingIMDb && ratingIMDb.includes('http')) {
                        const match = ratingIMDb.match(/(\d+[,.]?\d*)/);
                        ratingIMDb = match ? match[1].replace(',', '.') : '';
                    }
                    if (ratingIMDb === '—' || ratingIMDb === '-') ratingIMDb = '';
                    
                    let audioInfo = getVal(audioIndex);
                    let audioArray = [];
                    if (audioInfo && audioInfo !== '—' && audioInfo !== '-') {
                        if (audioInfo.includes('Аудио #')) {
                            audioArray = audioInfo.split(/(?=Аудио #\d+)/);
                        } else if (audioInfo.includes('\n')) {
                            audioArray = audioInfo.split('\n');
                        } else {
                            audioArray = [audioInfo];
                        }
                        audioArray = audioArray.map(a => a.trim()).filter(a => a && a !== '—');
                    }
                    
                    let subtitles = getVal(subtitlesIndex);
                    let subtitlesArray = [];
                    if (subtitles && subtitles !== '—' && subtitles !== '-') {
                        subtitlesArray = subtitles.split(/[,;]/).map(s => s.trim()).filter(s => s && s !== '—');
                    }
                    
                    const movie = {
                        id: i,
                        russianTitle: displayTitle,
                        originalTitle: displayOriginal,
                        year: getVal(yearIndex),
                        genre: getVal(genreIndex),
                        description: getVal(descriptionIndex),
                        kinopoiskLink: getVal(kinopoiskLinkIndex),
                        ratingKP: ratingKP,
                        ratingIMDb: ratingIMDb,
                        actors: getVal(actorsIndex),
                        country: getVal(countryIndex),
                        director: getVal(directorIndex),
                        fileName: getVal(fileNameIndex),
                        duration: getVal(durationIndex),
                        size: getVal(sizeIndex),
                        resolution: getVal(resolutionIndex),
                        audioInfo: audioArray,
                        subtitles: subtitlesArray,
                        yandexFolder: getVal(yandexIndex)
                    };
                    
                    allMovies.push(movie);
                    
                    if (movie.genre && movie.genre !== '—') {
                        movie.genre.split(/[,;\/]/).forEach(g => {
                            const genre = g.trim();
                            if (genre && genre.length > 1 && genre !== '—') uniqueGenres.add(genre);
                        });
                    }
                    
                    if (movie.year) {
                        const yearMatch = String(movie.year).match(/\d{4}/);
                        if (yearMatch) uniqueYears.add(yearMatch[0]);
                    }
                    
                    if (movie.country && movie.country !== '—' && movie.country !== '-') {
                        uniqueCountries.add(movie.country);
                    }
                    
                    if (movie.actors && movie.actors !== '—' && movie.actors !== '-') {
                        movie.actors.split(/[,;]/).forEach(actor => {
                            const a = actor.trim();
                            if (a && a.length > 2 && a !== '—') uniqueActors.add(a);
                        });
                    }
                }
                
                console.log('Загружено фильмов:', allMovies.length);
                
                if (allMovies.length === 0) {
                    throw new Error('Не найдено фильмов. Проверьте данные в таблице.');
                }
                
                function populateFilter(selectId, valuesSet, sortByNumber = false) {
                    const select = document.getElementById(selectId);
                    if (!select) return;
                    let values = Array.from(valuesSet);
                    if (sortByNumber) {
                        values.sort((a, b) => {
                            const numA = parseInt(a);
                            const numB = parseInt(b);
                            if (!isNaN(numA) && !isNaN(numB)) return numB - numA;
                            return a.localeCompare(b);
                        });
                    } else {
                        values.sort();
                    }
                    values.forEach(value => {
                        if (value && value !== '—' && value !== '-') {
                            select.innerHTML += `<option value="${escapeHtml(value)}">${escapeHtml(value.length > 50 ? value.substring(0, 50) + '...' : value)}</option>`;
                        }
                    });
                }
                
                document.getElementById('genreFilter').innerHTML = '<option value="">🎭 Все жанры</option>';
                document.getElementById('yearFilter').innerHTML = '<option value="">📅 Все годы</option>';
                document.getElementById('countryFilter').innerHTML = '<option value="">🌍 Все страны</option>';
                document.getElementById('actorFilter').innerHTML = '<option value="">⭐ Все актеры</option>';
                
                populateFilter('genreFilter', uniqueGenres);
                populateFilter('yearFilter', uniqueYears, true);
                populateFilter('countryFilter', uniqueCountries);
                populateFilter('actorFilter', uniqueActors);
                
                displayMovies(allMovies);
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${escapeHtml(error.message)}<br><br>
                        Проверьте консоль (F12) для деталей
                    </div>
                `;
            }
        }
        
        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    if (char === '\r') i++;
                    currentRow.push(currentField);
                    if (currentRow.length > 0 && !(currentRow.length === 1 && currentRow[0] === '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.length > 0 && !(currentRow.length === 1 && currentRow[0] === '')) {
                    rows.push(currentRow);
                }
            }
            
            return rows;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        function extractYear(dateStr) {
            if (!dateStr) return '';
            const match = String(dateStr).match(/\d{4}/);
            return match ? match[0] : '';
        }
        
        function getRating(movie) {
            if (movie.ratingKP && movie.ratingKP !== '—') return `КП: ${movie.ratingKP}`;
            if (movie.ratingIMDb && movie.ratingIMDb !== '—') return `IMDb: ${movie.ratingIMDb}`;
            return '—';
        }
        
        function displayMovies(movies) {
            const contentDiv = document.getElementById('content');
            const statsDiv = document.getElementById('stats');
            
            statsDiv.innerHTML = `📊 Найдено: ${movies.length} фильмов`;
            
            if (movies.length === 0) {
                contentDiv.innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            let cardsHtml = '<div class="movies-grid">';
            for (let i = 0; i < movies.length; i++) {
                const movie = movies[i];
                const originalIndex = allMovies.findIndex(m => m.id === movie.id);
                
                cardsHtml += `
                    <div class="movie-card" onclick="showMovieDetails(${originalIndex})">
                        <div class="movie-info">
                            <div class="movie-title">🎬 ${escapeHtml(movie.russianTitle.length > 60 ? movie.russianTitle.substring(0, 60) + '...' : movie.russianTitle)}</div>
                            ${movie.originalTitle && movie.originalTitle !== movie.russianTitle ? `<div class="movie-title-original">${escapeHtml(movie.originalTitle.length > 50 ? movie.originalTitle.substring(0, 50) + '...' : movie.originalTitle)}</div>` : ''}
                            <div class="movie-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(extractYear(movie.year) || '—')}</div>
                            <div class="movie-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre ? (movie.genre.length > 50 ? movie.genre.substring(0, 50) + '...' : movie.genre) : '—')}</div>
                            <div class="movie-detail"><span class="movie-label">⭐ Рейтинг:</span> ${escapeHtml(getRating(movie))}</div>
                            <div class="movie-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director ? (movie.director.length > 40 ? movie.director.substring(0, 40) + '...' : movie.director) : '—')}</div>
                        </div>
                    </div>
                `;
            }
            cardsHtml += '</div>';
            contentDiv.innerHTML = cardsHtml;
        }
        
        function filterMovies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedGenre = document.getElementById('genreFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            const selectedCountry = document.getElementById('countryFilter').value;
            const selectedActor = document.getElementById('actorFilter').value;
            
            const filtered = allMovies.filter(movie => {
                const searchFields = [
                    movie.russianTitle,
                    movie.originalTitle,
                    movie.genre,
                    movie.actors,
                    movie.director,
                    movie.description,
                    movie.country
                ].join(' ').toLowerCase();
                
                const matchesSearch = !searchTerm || searchFields.includes(searchTerm);
                
                let matchesGenre = !selectedGenre;
                if (selectedGenre && !matchesGenre) {
                    const movieGenres = (movie.genre || '').split(/[,;\/]/).map(g => g.trim());
                    matchesGenre = movieGenres.includes(selectedGenre);
                }
                
                const movieYear = extractYear(movie.year);
                const matchesYear = !selectedYear || movieYear === selectedYear;
                
                const matchesCountry = !selectedCountry || (movie.country || '').includes(selectedCountry);
                
                let matchesActor = !selectedActor;
                if (selectedActor && !matchesActor) {
                    const movieActors = (movie.actors || '').split(/[,;]/).map(a => a.trim());
                    matchesActor = movieActors.some(actor => actor.includes(selectedActor));
                }
                
                return matchesSearch && matchesGenre && matchesYear && matchesCountry && matchesActor;
            });
            
            displayMovies(filtered);
        }
        
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterMovies, 300);
        });
        document.getElementById('genreFilter').addEventListener('change', filterMovies);
        document.getElementById('yearFilter').addEventListener('change', filterMovies);
        document.getElementById('countryFilter').addEventListener('change', filterMovies);
        document.getElementById('actorFilter').addEventListener('change', filterMovies);
        
        const modal = document.getElementById('modal');
        document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target === modal) modal.style.display = 'none';
        };
        
        loadMovies();
    </script>
</body>
