<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        
        .top-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .random-btn, .sort-select {
            background: #58a6ff;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .sort-select {
            background: #161b22;
            border: 1px solid #3d444d;
            color: #e6edf3;
        }
        
        .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input, select {
            background: #161b22;
            border: 1px solid #3d444d;
            color: #e6edf3;
            padding: 8px 15px;
            border-radius: 25px;
        }
        input { width: 300px; }
        
        .stats { text-align: center; margin-bottom: 20px; color: #8d96a0; font-size: 14px; }
        .movies { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); background: #1f2428; }
        .title { font-weight: bold; color: #58a6ff; }
        .year { font-size: 12px; color: #8d96a0; margin-top: 5px; }
        .movie-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #1f2428;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #161b22;
            border-radius: 16px;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .close { float: right; cursor: pointer; font-size: 24px; }
        .detail-line { margin: 10px 0; padding: 5px 0; border-bottom: 1px solid #21262d; }
        .detail-label { color: #58a6ff; font-weight: bold; }
        
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #161b22;
            border: 1px solid #3d444d;
            cursor: pointer;
            font-size: 22px;
            z-index: 100;
        }
        
        body.light {
            background: #f6f8fa;
            color: #1f2328;
        }
        body.light .card { background: #ffffff; }
        body.light .card:hover { background: #f0f3f5; }
        body.light .modal-content { background: #ffffff; }
        body.light input, body.light select, body.light .sort-select { background: #ffffff; color: #1f2328; border-color: #d0d7de; }
        body.light .theme-toggle { background: #ffffff; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <h1>🎬 Каталог медиафайлов</h1>
    
    <div class="top-bar">
        <select id="sortSelect" class="sort-select">
            <option value="default">📊 По умолчанию</option>
            <option value="year_asc">📅 Год (старые → новые)</option>
            <option value="year_desc">📅 Год (новые → старые)</option>
            <option value="title_asc">🔤 Название (А → Я)</option>
            <option value="title_desc">🔤 Название (Я → А)</option>
        </select>
        <button class="random-btn" id="randomBtn">🎲 Случайный фильм</button>
    </div>
    
    <div class="filters">
        <input type="text" id="search" placeholder="🔍 Поиск по названию, актёрам, режиссёру, стране, жанру...">
        <select id="genre"><option value="">Все жанры</option></select>
        <select id="year"><option value="">Все годы</option></select>
    </div>
    
    <div class="stats" id="stats">Загрузка...</div>
    <div id="movies" class="movies"></div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let movies = [], filtered = [];
        let currentSort = 'default';
        let posterCache = {};
        
        async function loadPosters() {
            try {
                const res = await fetch('./posters.json');
                if (res.ok) {
                    const data = await res.json();
                    posterCache = data.posters || {};
                    console.log('Постеров в кеше:', Object.keys(posterCache).length);
                }
            } catch(e) { console.log('Постеры не загружены'); }
        }
        
        function getPosterUrl(movie) {
            // Сначала ищем по точному названию (как в posters.json)
            if (posterCache[movie.title] && posterCache[movie.title].posterUrl) {
                return posterCache[movie.title].posterUrl;
            }
            // Потом по названию с годом
            const keyWithYear = `${movie.title}_${movie.year}`;
            if (posterCache[keyWithYear] && posterCache[keyWithYear].posterUrl) {
                return posterCache[keyWithYear].posterUrl;
            }
            // Потом по оригинальному названию
            if (movie.originalTitle && posterCache[movie.originalTitle] && posterCache[movie.originalTitle].posterUrl) {
                return posterCache[movie.originalTitle].posterUrl;
            }
            return null;
        }
        
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            themeToggle.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
            localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
        });
        
        function escape(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        function sortMovies(arr) {
            const sorted = [...arr];
            switch(currentSort) {
                case 'year_asc': sorted.sort((a,b) => (parseInt(a.year)||0) - (parseInt(b.year)||0)); break;
                case 'year_desc': sorted.sort((a,b) => (parseInt(b.year)||0) - (parseInt(a.year)||0)); break;
                case 'title_asc': sorted.sort((a,b) => a.title.localeCompare(b.title)); break;
                case 'title_desc': sorted.sort((a,b) => b.title.localeCompare(a.title)); break;
                default: break;
            }
            return sorted;
        }
        
        function applyFiltersAndSort() {
            const search = document.getElementById('search').value.toLowerCase();
            const genre = document.getElementById('genre').value;
            const year = document.getElementById('year').value;
            
            let result = movies.filter(m => {
                const searchFields = [
                    m.title, m.originalTitle, m.genre, m.actors, m.director, m.country, m.description
                ].join(' ').toLowerCase();
                if (search && !searchFields.includes(search)) return false;
                if (genre && !(m.genre || '').includes(genre)) return false;
                if (year && m.year !== year) return false;
                return true;
            });
            filtered = sortMovies(result);
            render();
        }
        
        async function load() {
            try {
                await loadPosters();
                const res = await fetch('./movies.json');
                const data = await res.json();
                movies = data.movies;
                console.log('Загружено фильмов:', movies.length);
                
                const genres = new Set(), years = new Set();
                for (let m of movies) {
                    if (m.genre) m.genre.split(/[,/]/).forEach(g => { if(g && g.trim()) genres.add(g.trim()); });
                    if (m.year && m.year !== '—') years.add(m.year);
                }
                const genreSel = document.getElementById('genre');
                const yearSel = document.getElementById('year');
                genreSel.innerHTML = '<option value="">Все жанры</option>';
                yearSel.innerHTML = '<option value="">Все годы</option>';
                [...genres].sort().forEach(g => genreSel.innerHTML += `<option value="${escape(g)}">${escape(g)}</option>`);
                [...years].sort((a,b)=>b-a).forEach(y => yearSel.innerHTML += `<option value="${y}">${y}</option>`);
                
                filtered = [...movies];
                render();
            } catch(e) {
                document.getElementById('stats').innerHTML = 'Ошибка: ' + e.message;
            }
        }
        
        function render() {
            document.getElementById('stats').innerHTML = `🎬 ${filtered.length} из ${movies.length} фильмов`;
            if (filtered.length === 0) {
                document.getElementById('movies').innerHTML = '<div style="text-align:center">😔 Ничего не найдено</div>';
                return;
            }
            
            let html = '';
            for (let m of filtered) {
                const posterUrl = getPosterUrl(m);
                const posterHtml = posterUrl
                    ? `<img class="movie-poster" src="${escape(posterUrl)}" onerror="this.style.display='none'">`
                    : '';
                
                html += `
                    <div class="card" onclick="showDetails(${movies.findIndex(x=>x.id===m.id)})">
                        ${posterHtml}
                        <div class="title">${escape(m.title).substring(0, 60)}</div>
                        <div class="year">📅 ${m.year || '—'} | 🎬 ${(m.director || '—').substring(0, 40)}</div>
                        <div class="year">🎭 ${(m.genre || '—').substring(0, 60)}</div>
                    </div>
                `;
            }
            document.getElementById('movies').innerHTML = html;
        }
        
        document.getElementById('randomBtn').addEventListener('click', () => {
            if (filtered.length === 0) return;
            const rand = Math.floor(Math.random() * filtered.length);
            const idx = movies.findIndex(x => x.id === filtered[rand].id);
            showDetails(idx);
        });
        
        window.showDetails = function(idx) {
            const m = movies[idx];
            if (!m) return;
            let html = `<h3>${escape(m.title)}</h3>`;
            if (m.originalTitle) html += `<div class="detail-line"><span class="detail-label">Оригинал:</span> ${escape(m.originalTitle)}</div>`;
            if (m.year) html += `<div class="detail-line"><span class="detail-label">Год:</span> ${m.year}</div>`;
            if (m.country) html += `<div class="detail-line"><span class="detail-label">Страна:</span> ${escape(m.country)}</div>`;
            if (m.genre) html += `<div class="detail-line"><span class="detail-label">Жанр:</span> ${escape(m.genre)}</div>`;
            if (m.director) html += `<div class="detail-line"><span class="detail-label">Режиссер:</span> ${escape(m.director)}</div>`;
            if (m.actors) html += `<div class="detail-line"><span class="detail-label">Актеры:</span> ${escape(m.actors).substring(0, 250)}</div>`;
            if (m.description) html += `<div class="detail-line"><span class="detail-label">Описание:</span> ${escape(m.description)}</div>`;
            if (m.audioInfo) {
              const audioLines = m.audioInfo.split(/\r?\n/)
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => `<div class="audio-item">${escape(line)}</div>`)
                .join('');
            
              if (audioLines) {
                html += `
                  <div class="detail-line audio-container">
                    <span class="detail-label">Аудио:</span>
                    <div class="audio-list">${audioLines}</div>
                  </div>
                `;
              }
            }
            if (m.subtitles) {
              // Очищаем исходный текст от пробелов по краям
              const cleanSubtitles = m.subtitles.trim();
              
              // Проверяем, что строка не пустая и не содержит стоп-слова
              const hasNoSubtitles = ['нет', 'none', '-', 'not available'].includes(cleanSubtitles.toLowerCase());
            
              if (cleanSubtitles.length > 0 && !hasNoSubtitles) {
                const subtitlesLines = cleanSubtitles.split(/\r?\n/)
                  .map(line => line.trim())
                  .filter(line => line.length > 0)
                  .map(line => `<div class="subtitles-item">${escape(line)}</div>`)
                  .join('');
            
                // Финальная проверка: если после фильтрации строк что-то осталось, выводим HTML
                if (subtitlesLines) {
                  html += `
                    <div class="detail-line subtitles-container">
                      <span class="detail-label">Субтитры:</span>
                      <div class="subtitles-list">${subtitlesLines}</div>
                    </div>
                  `;
                }
              }
            }

            // 1. Собираем поисковый запрос (Название + Год)
            let searchQuery = '';
            if (m.originalTitle && m.originalTitle.trim().length > 0) {
                searchQuery = m.originalTitle.trim();
            } else if (m.title && m.title.trim().length > 0) {
                searchQuery = m.title.trim();
            }

            if (searchQuery && m.year) {
                searchQuery += ' ' + m.year;
            }

            // 2. Формируем блок кнопок-ссылок
            if (searchQuery || (m.kinopoiskLink && m.kinopoiskLink.startsWith('http'))) {
                let buttonsHtml = '<div class="detail-line movie-buttons-row" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; width: 100%; box-sizing: border-box;">';

                // Генерируем символы / и ? через коды, чтобы движок сайта их гарантированно не вырезал
                const slash = String.fromCharCode(47);
                const question = String.fromCharCode(63);

                // Базовые инлайновые стили для кнопок (фиксируем размер иконки внутри через стиль svg)
                const baseBtnStyle = 'display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; color: #ffffff !important; text-decoration: none !important; border-radius: 8px; font-weight: bold; font-size: 14px; transition: background-color 0.2s ease, transform 0.1s ease; flex: 1 1 160px; text-align: center; cursor: pointer; box-sizing: border-box;';
                const svgStyle = 'width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; display: inline-block; vertical-align: middle;';

                // SVG-код логотипа Кинориума (сразу зажимаем его в рамки svgStyle)
                const kinoriumSvg = '<svg style="' + svgStyle + '" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15.5h-2v-2h2v2zm0-4h-2V7h2v6.5z"/></svg>';
                
                // SVG-код логотипа Кинопоиска (буква К)
                const kinopoiskSvg = '<svg style="' + svgStyle + '" viewBox="0 0 24 24"><path d="M18.15 2h-4.32l-5.18 7.39V2H4.94v20h3.71v-6.93l5.52 6.93h4.48l-6.84-8.31L18.15 2z"/></svg>';

                // Кнопка Кинориум
                if (searchQuery) {
                    const encodedQuery = encodeURIComponent(searchQuery);
                    const kinoriumLink = 'https:' + slash + slash + '://kinorium.com' + slash + 'search' + slash + question + 'q=' + encodedQuery;
                    
                    buttonsHtml += '<a href="' + kinoriumLink + '" target="_blank" ' +
                        'style="' + baseBtnStyle + ' background-color: #ffaa00;" ' +
                        'onmouseover="this.style.backgroundColor=\'#e09500\'" ' +
                        'onmouseout="this.style.backgroundColor=\'#ffaa00\'" ' +
                        'onmousedown="this.style.transform=\'scale(0.97)\'" ' +
                        'onmouseup="this.style.transform=\'scale(1)\'">' + 
                        kinoriumSvg + 'Кинориум</a>';
                }

                // Кнопка Кинопоиск
                if (m.kinopoiskLink && m.kinopoiskLink.startsWith('http')) {
                    buttonsHtml += '<a href="' + escape(m.kinopoiskLink) + '" target="_blank" ' +
                        'style="' + baseBtnStyle + ' background-color: #ff6600;" ' +
                        'onmouseover="this.style.backgroundColor=\'#e05500\'" ' +
                        'onmouseout="this.style.backgroundColor=\'#ff6600\'" ' +
                        'onmousedown="this.style.transform=\'scale(0.97)\'" ' +
                        'onmouseup="this.style.transform=\'scale(1)\'">' + 
                        kinopoiskSvg + 'Кинопоиск</a>';
                } else if (searchQuery) {
                    const encodedQuery = encodeURIComponent(searchQuery);
                    const kpSearchLink = 'https:' + slash + slash + 'www.kinopoisk.ru' + slash + 'index.php' + question + 'kp_query=' + encodedQuery;
                    
                    buttonsHtml += '<a href="' + kpSearchLink + '" target="_blank" ' +
                        'style="' + baseBtnStyle + ' background-color: #ff6600;" ' +
                        'onmouseover="this.style.backgroundColor=\'#e05500\'" ' +
                        'onmouseout="this.style.backgroundColor=\'#ff6600\'" ' +
                        'onmousedown="this.style.transform=\'scale(0.97)\'" ' +
                        'onmouseup="this.style.transform=\'scale(1)\'">' + 
                        kinopoiskSvg + 'Кинопоиск</a>';
                }

                buttonsHtml += '</div>';
                html += buttonsHtml;
            }

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        };
        
        let searchTimeout;
        document.getElementById('search').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFiltersAndSort, 300);
        });
        document.getElementById('genre').addEventListener('change', applyFiltersAndSort);
        document.getElementById('year').addEventListener('change', applyFiltersAndSort);
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            applyFiltersAndSort();
        });
        document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
        
        load();
    </script>
</body>
</html>
