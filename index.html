<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input, select {
            padding: 10px 15px;
            background: #1f2428;
            border: 1px solid #3d444d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
        }
        input { width: 300px; }
        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #8d96a0;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .movie-card {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .movie-card:hover {
            transform: translateY(-3px);
            background: #1f2428;
        }
        .movie-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #58a6ff;
        }
        .movie-year { font-size: 12px; color: #8d96a0; margin-bottom: 8px; }
        .movie-genre { font-size: 12px; color: #8d96a0; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #8d96a0;
        }
        .error {
            text-align: center;
            padding: 40px;
            background: #da36331a;
            border-radius: 12px;
            color: #f85149;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .pagination button {
            padding: 8px 16px;
            background: #21262d;
            border: 1px solid #3d444d;
            border-radius: 8px;
            color: #e6edf3;
            cursor: pointer;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #161b22;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #3d444d;
        }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: #8d96a0;
        }
        .modal-detail { margin: 10px 0; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .movie-label { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Каталог медиафайлов</h1>
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Поиск...">
            <select id="genreFilter"><option value="">Все жанры</option></select>
            <select id="yearFilter"><option value="">Все годы</option></select>
        </div>
        <div class="stats" id="stats"></div>
    </div>
    <div id="content"><div class="loading">Загрузка каталога...</div></div>
    <div id="pagination" class="pagination"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let filtered = [];
        let page = 1;
        const PER_PAGE = 40;
        
        async function load() {
            try {
                const res = await fetch('./movies.json');
                if (!res.ok) throw new Error('movies.json не найден');
                const data = await res.json();
                allMovies = data.movies;
                console.log('Загружено:', allMovies.length);
                
                // Заполняем фильтры
                const genres = new Set();
                const years = new Set();
                for (let m of allMovies) {
                    if (m.genre) m.genre.split(/[,/]/).forEach(g => { if(g.trim()) genres.add(g.trim()); });
                    if (m.year) years.add(m.year);
                }
                const genreSel = document.getElementById('genreFilter');
                const yearSel = document.getElementById('yearFilter');
                [...genres].sort().forEach(g => { genreSel.innerHTML += `<option value="${g}">${g}</option>`; });
                [...years].sort((a,b)=>b-a).forEach(y => { yearSel.innerHTML += `<option value="${y}">${y}</option>`; });
                
                filtered = [...allMovies];
                render();
            } catch(e) {
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${e.message}</div>`;
            }
        }
        
        function filter() {
            const search = document.getElementById('search').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const year = document.getElementById('yearFilter').value;
            
            filtered = allMovies.filter(m => {
                if (search && !m.title.toLowerCase().includes(search) && !(m.originalTitle || '').toLowerCase().includes(search)) return false;
                if (genre && !(m.genre || '').includes(genre)) return false;
                if (year && m.year !== year) return false;
                return true;
            });
            page = 1;
            render();
        }
        
        function render() {
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const start = (page-1) * PER_PAGE;
            const pageMovies = filtered.slice(start, start + PER_PAGE);
            
            document.getElementById('stats').innerHTML = `🎬 ${filtered.length} из ${allMovies.length} фильмов | Страница ${page} из ${totalPages || 1}`;
            
            if (pageMovies.length === 0) {
                document.getElementById('content').innerHTML = '<div class="loading">😔 Ничего не найдено</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '<div class="movies-grid">';
            for (let i = 0; i < pageMovies.length; i++) {
                const m = pageMovies[i];
                const idx = allMovies.findIndex(x => x.id === m.id);
                html += `
                    <div class="movie-card" onclick="showDetails(${idx})">
                        <div class="movie-title">${escape(m.title)}</div>
                        ${m.originalTitle ? `<div class="movie-year">${escape(m.originalTitle)}</div>` : ''}
                        <div class="movie-year">📅 ${m.year || '—'}</div>
                        <div class="movie-genre">🎭 ${(m.genre || '—').substring(0, 60)}</div>
                        ${m.director ? `<div class="movie-genre">🎬 ${escape(m.director).substring(0, 40)}</div>` : ''}
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('content').innerHTML = html;
            
            // Пагинация
            let pagHtml = '';
            if (totalPages > 1) {
                pagHtml = `<button onclick="goPage(${page-1})" ${page===1 ? 'disabled' : ''}>◀ Назад</button>`;
                pagHtml += `<span style="margin:0 15px">Страница ${page} из ${totalPages}</span>`;
                pagHtml += `<button onclick="goPage(${page+1})" ${page===totalPages ? 'disabled' : ''}>Вперед ▶</button>`;
            }
            document.getElementById('pagination').innerHTML = pagHtml;
            window.scrollTo({ top: 0 });
        }
        
        function goPage(p) {
            const total = Math.ceil(filtered.length / PER_PAGE);
            if (p < 1 || p > total) return;
            page = p;
            render();
        }
        
        window.showDetails = function(idx) {
            const m = allMovies[idx];
            if (!m) return;
            let html = `<h3>${escape(m.title)}</h3>`;
            if (m.originalTitle) html += `<div class="modal-detail"><span class="movie-label">Оригинал:</span> ${escape(m.originalTitle)}</div>`;
            if (m.year) html += `<div class="modal-detail"><span class="movie-label">Год:</span> ${m.year}</div>`;
            if (m.country) html += `<div class="modal-detail"><span class="movie-label">Страна:</span> ${escape(m.country)}</div>`;
            if (m.genre) html += `<div class="modal-detail"><span class="movie-label">Жанр:</span> ${escape(m.genre)}</div>`;
            if (m.director) html += `<div class="modal-detail"><span class="movie-label">Режиссер:</span> ${escape(m.director)}</div>`;
            if (m.actors) html += `<div class="modal-detail"><span class="movie-label">Актеры:</span> ${escape(m.actors).substring(0, 200)}</div>`;
            if (m.description) html += `<div class="modal-detail"><span class="movie-label">Описание:</span> ${escape(m.description)}</div>`;
            if (m.audioInfo && m.audioInfo !== '—') {
                html += `<div class="modal-detail"><span class="movie-label">Аудио:</span> ${escape(m.audioInfo).substring(0, 300)}</div>`;
            }
            if (m.subtitles && m.subtitles !== '—') {
                html += `<div class="modal-detail"><span class="movie-label">Субтитры:</span> ${escape(m.subtitles)}</div>`;
            }
            if (m.kinopoiskLink && m.kinopoiskLink.startsWith('http')) {
                html += `<div class="modal-detail"><a href="${escape(m.kinopoiskLink)}" target="_blank">🎬 Кинопоиск</a></div>`;
            }
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        };
        
        function escape(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        document.getElementById('search').addEventListener('input', filter);
        document.getElementById('genreFilter').addEventListener('change', filter);
        document.getElementById('yearFilter').addEventListener('change', filter);
        document.querySelector('.close-modal').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
        
        load();
    </script>
</body>
</html>
