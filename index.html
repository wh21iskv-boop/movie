<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --card-hover: #1f2428;
            --text: #e6edf3;
            --text-secondary: #8d96a0;
            --accent: #58a6ff;
            --border: #3d444d;
            --modal-bg: #161b22;
            --skeleton: #1f2428;
        }
        
        body.light {
            --bg: #f6f8fa;
            --card-bg: #ffffff;
            --card-hover: #f0f3f5;
            --text: #1f2328;
            --text-secondary: #656d76;
            --accent: #0969da;
            --border: #d0d7de;
            --modal-bg: #ffffff;
            --skeleton: #e8eaed;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 22px;
            z-index: 100;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .sort-select, .random-btn {
            padding: 8px 16px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
        }
        
        .random-btn {
            background: var(--accent);
            border: none;
            color: white;
        }
        
        .search-section { margin-bottom: 20px; }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            font-size: 16px;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        select {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
        }
        
        .stats {
            text-align: right;
            margin-bottom: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        /* Скелетон (каркас) */
        .skeleton-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            height: 350px;
        }
        .skeleton-poster {
            height: 230px;
            background: var(--skeleton);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-text {
            height: 16px;
            background: var(--skeleton);
            margin: 10px 15px;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-text-small {
            height: 12px;
            width: 60%;
            background: var(--skeleton);
            margin: 10px 15px;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .movie-card:hover {
            transform: translateY(-3px);
            background: var(--card-hover);
        }
        
        .movie-poster {
            width: 100%;
            height: 230px;
            object-fit: cover;
            background: var(--card-hover);
        }
        .movie-poster-placeholder {
            width: 100%;
            height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-hover);
            font-size: 48px;
        }
        
        .movie-info { padding: 15px; }
        .movie-title { font-size: 17px; font-weight: bold; margin-bottom: 5px; }
        .movie-title-original { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .movie-detail { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .movie-label { color: var(--accent); font-weight: bold; }
        
        .loading, .no-results { text-align: center; padding: 60px; color: var(--text-secondary); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--modal-bg);
            border-radius: 16px;
            max-width: 650px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-secondary);
        }
        .modal h3 { color: var(--accent); margin-bottom: 15px; }
        .modal-detail { margin: 10px 0; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .audio-line { display: block; padding: 4px 0 4px 20px; font-size: 12px; border-left: 2px solid var(--accent); margin: 4px 0; }
        .subtitle-line { display: block; padding: 4px 0 4px 20px; font-size: 12px; border-left: 1px dashed var(--accent); margin: 4px 0; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="top-bar">
            <select id="sortSelect" class="sort-select">
                <option value="default">📊 По умолчанию</option>
                <option value="year_asc">📅 Год (старые → новые)</option>
                <option value="year_desc">📅 Год (новые → старые)</option>
                <option value="rating_desc">⭐ Рейтинг (сначала высокие)</option>
                <option value="title_asc">🔤 Название (А → Я)</option>
                <option value="title_desc">🔤 Название (Я → А)</option>
            </select>
            <button class="random-btn" id="randomBtn">🎲 Случайный фильм</button>
        </div>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию, актёрам, режиссёру, стране, жанру...">
            <div class="filters">
                <select id="genreFilter"><option value="">🎭 Все жанры</option></select>
                <select id="yearFilter"><option value="">📅 Все годы</option></select>
                <select id="countryFilter"><option value="">🌍 Все страны</option></select>
                <select id="actorFilter"><option value="">⭐ Все актеры</option></select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        <div id="content"><div class="movies-grid" id="skeleton-container"></div></div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let allMovies = [];
        let filteredMovies = [];
        let currentSort = 'default';
        let isLoading = true;
        
        // Тема
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
        
        function escape(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        function getRating(m) {
            if (m.ratingKP && m.ratingKP !== '—') return `КП: ${m.ratingKP}`;
            if (m.ratingIMDb && m.ratingIMDb !== '—') return `IMDb: ${m.ratingIMDb}`;
            return '—';
        }
        
        // Показываем скелетоны при загрузке
        function showSkeletons() {
            let skeletons = '';
            for (let i = 0; i < 20; i++) {
                skeletons += `
                    <div class="skeleton-card">
                        <div class="skeleton-poster"></div>
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text-small"></div>
                        <div class="skeleton-text-small"></div>
                    </div>
                `;
            }
            document.getElementById('content').innerHTML = `<div class="movies-grid">${skeletons}</div>`;
        }
        
        // Сортировка
        function sortMovies(movies) {
            const sorted = [...movies];
            switch(currentSort) {
                case 'year_asc': sorted.sort((a,b) => (parseInt(a.year)||0) - (parseInt(b.year)||0)); break;
                case 'year_desc': sorted.sort((a,b) => (parseInt(b.year)||0) - (parseInt(a.year)||0)); break;
                case 'rating_desc': sorted.sort((a,b) => {
                    const ra = parseFloat(a.ratingKP || a.ratingIMDb || 0);
                    const rb = parseFloat(b.ratingKP || b.ratingIMDb || 0);
                    return rb - ra;
                }); break;
                case 'title_asc': sorted.sort((a,b) => a.title.localeCompare(b.title)); break;
                case 'title_desc': sorted.sort((a,b) => b.title.localeCompare(a.title)); break;
                default: return movies;
            }
            return sorted;
        }
        
        // Загрузка данных
        async function loadMovies() {
            showSkeletons();
            
            try {
                const res = await fetch('./movies.json');
                const data = await res.json();
                allMovies = data.movies;
                
                // Заполняем фильтры
                const genres = new Set();
                const years = new Set();
                const countries = new Set();
                const actors = new Set();
                
                for (let m of allMovies) {
                    if (m.genre) m.genre.split(/[,;\/]/).forEach(g => { if(g && g.trim()) genres.add(g.trim()); });
                    if (m.year && m.year !== '—') years.add(m.year);
                    if (m.country && m.country !== '—') countries.add(m.country);
                    if (m.actors) m.actors.split(/[,;]/).forEach(a => { if(a && a.trim() && a.length > 2) actors.add(a.trim()); });
                }
                
                const genreSel = document.getElementById('genreFilter');
                const yearSel = document.getElementById('yearFilter');
                const countrySel = document.getElementById('countryFilter');
                const actorSel = document.getElementById('actorFilter');
                
                genreSel.innerHTML = '<option value="">🎭 Все жанры</option>';
                yearSel.innerHTML = '<option value="">📅 Все годы</option>';
                countrySel.innerHTML = '<option value="">🌍 Все страны</option>';
                actorSel.innerHTML = '<option value="">⭐ Все актеры</option>';
                
                [...genres].sort().forEach(g => genreSel.innerHTML += `<option value="${escape(g)}">${escape(g)}</option>`);
                [...years].sort((a,b)=>parseInt(b)-parseInt(a)).forEach(y => yearSel.innerHTML += `<option value="${y}">${y}</option>`);
                [...countries].sort().forEach(c => countrySel.innerHTML += `<option value="${escape(c)}">${escape(c)}</option>`);
                [...actors].sort().forEach(a => actorSel.innerHTML += `<option value="${escape(a)}">${escape(a).substring(0, 50)}</option>`);
                
                filteredMovies = [...allMovies];
                applyFiltersAndSort();
                
            } catch(e) {
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${e.message}</div>`;
            }
        }
        
        // Фильтрация (расширенный поиск по всем полям)
        function applyFiltersAndSort() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const genre = document.getElementById('genreFilter').value;
            const year = document.getElementById('yearFilter').value;
            const country = document.getElementById('countryFilter').value;
            const actor = document.getElementById('actorFilter').value;
            
            let filtered = allMovies.filter(m => {
                // Расширенный поиск по всем текстовым полям
                const searchFields = [
                    m.title, m.originalTitle, m.genre, m.actors, 
                    m.director, m.description, m.country
                ].join(' ').toLowerCase();
                
                if (search && !searchFields.includes(search)) return false;
                if (genre && !(m.genre || '').includes(genre)) return false;
                if (year && m.year !== year) return false;
                if (country && !(m.country || '').includes(country)) return false;
                if (actor && !(m.actors || '').includes(actor)) return false;
                return true;
            });
            
            filteredMovies = sortMovies(filtered);
            render();
        }
        
        // Отображение фильмов
        function render() {
            document.getElementById('stats').innerHTML = `📊 Найдено: ${filteredMovies.length} из ${allMovies.length} фильмов`;
            
            if (filteredMovies.length === 0) {
                document.getElementById('content').innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            let html = '<div class="movies-grid">';
            for (let m of filteredMovies) {
                const idx = allMovies.findIndex(x => x.id === m.id);
                const posterHtml = m.posterUrl
                    ? `<img class="movie-poster" src="${escape(m.posterUrl)}" onerror="this.parentElement.innerHTML='<div class=\'movie-poster-placeholder\'>🎬</div>'">`
                    : `<div class="movie-poster-placeholder">🎬</div>`;
                
                html += `
                    <div class="movie-card" onclick="showDetails(${idx})">
                        ${posterHtml}
                        <div class="movie-info">
                            <div class="movie-title">${escape(m.title).substring(0, 60)}</div>
                            ${m.originalTitle ? `<div class="movie-title-original">${escape(m.originalTitle).substring(0, 50)}</div>` : ''}
                            <div class="movie-detail"><span class="movie-label">📅 Год:</span> ${m.year || '—'}</div>
                            <div class="movie-detail"><span class="movie-label">🎭 Жанр:</span> ${(m.genre || '—').substring(0, 60)}</div>
                            <div class="movie-detail"><span class="movie-label">⭐ Рейтинг:</span> ${getRating(m)}</div>
                            <div class="movie-detail"><span class="movie-label">🎬 Режиссер:</span> ${(m.director || '—').substring(0, 40)}</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }
        
        // Детали фильма
        window.showDetails = function(idx) {
            const m = allMovies[idx];
            if (!m) return;
            
            let rating = '';
            if (m.ratingKP) rating += `КП: ${m.ratingKP} `;
            if (m.ratingIMDb) rating += `IMDb: ${m.ratingIMDb}`;
            
            let links = '';
            if (m.kinopoiskLink && m.kinopoiskLink.startsWith('http')) {
                links += `<a href="${escape(m.kinopoiskLink)}" target="_blank" style="color:var(--accent);">🎬 Кинопоиск</a>`;
            }
            
            let html = `<h3>${escape(m.title)}</h3>`;
            if (m.originalTitle && m.originalTitle !== m.title) html += `<div class="modal-detail"><span class="movie-label">Оригинал:</span> ${escape(m.originalTitle)}</div>`;
            if (m.year) html += `<div class="modal-detail"><span class="movie-label">Год:</span> ${m.year}</div>`;
            if (m.country) html += `<div class="modal-detail"><span class="movie-label">Страна:</span> ${escape(m.country)}</div>`;
            if (m.genre) html += `<div class="modal-detail"><span class="movie-label">Жанр:</span> ${escape(m.genre)}</div>`;
            if (m.director) html += `<div class="modal-detail"><span class="movie-label">Режиссер:</span> ${escape(m.director)}</div>`;
            if (m.actors) html += `<div class="modal-detail"><span class="movie-label">Актеры:</span> ${escape(m.actors).substring(0, 300)}</div>`;
            if (rating) html += `<div class="modal-detail"><span class="movie-label">Рейтинг:</span> ${escape(rating)}</div>`;
            if (m.description) html += `<div class="modal-detail"><span class="movie-label">Описание:</span> ${escape(m.description)}</div>`;
            if (m.duration) html += `<div class="modal-detail"><span class="movie-label">Длительность:</span> ${escape(m.duration)}</div>`;
            if (m.resolution) html += `<div class="modal-detail"><span class="movie-label">Разрешение:</span> ${escape(m.resolution)}</div>`;
            
            if (m.audioInfo && m.audioInfo !== '—') {
                let ah = '<div class="modal-detail"><span class="movie-label">Аудио:</span><br>';
                const lines = m.audioInfo.split(/\r?\n/);
                for (let l of lines) if (l.trim()) ah += `<div class="audio-line">🎧 ${escape(l.trim())}</div>`;
                ah += '</div>';
                html += ah;
            }
            
            if (m.subtitles && m.subtitles !== '—') {
                let sh = '<div class="modal-detail"><span class="movie-label">Субтитры:</span><br>';
                const lines = m.subtitles.split(/[,;]/);
                for (let l of lines) if (l.trim()) sh += `<div class="subtitle-line">📄 ${escape(l.trim())}</div>`;
                sh += '</div>';
                html += sh;
            }
            
            if (links) html += `<div class="modal-detail">${links}</div>`;
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        };
        
        // Случайный фильм
        document.getElementById('randomBtn').addEventListener('click', () => {
            if (filteredMovies.length === 0) return;
            const rand = Math.floor(Math.random() * filteredMovies.length);
            const idx = allMovies.findIndex(x => x.id === filteredMovies[rand].id);
            showDetails(idx);
        });
        
        // Обработчики
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFiltersAndSort, 300);
        });
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            applyFiltersAndSort();
        });
        document.getElementById('genreFilter').addEventListener('change', applyFiltersAndSort);
        document.getElementById('yearFilter').addEventListener('change', applyFiltersAndSort);
        document.getElementById('countryFilter').addEventListener('change', applyFiltersAndSort);
        document.getElementById('actorFilter').addEventListener('change', applyFiltersAndSort);
        
        document.querySelector('.close-modal').onclick = () => document.getElementById('modal').style.display = 'none';
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
        
        loadMovies();
    </script>
</body>
</html>
