<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог медиафайлов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #2d3561;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        #searchInput:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        select {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #2d3561;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        
        .stats {
            text-align: right;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .movie-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.12);
        }
        
        .movie-info {
            padding: 15px;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: white;
        }
        
        .movie-detail {
            font-size: 12px;
            color: #b0b0b0;
            line-height: 1.4;
            margin-top: 5px;
        }
        
        .movie-label {
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.7);
        }
        
        .error {
            text-align: center;
            padding: 40px;
            background: rgba(220, 53, 69, 0.2);
            border-radius: 15px;
            margin: 20px;
            color: #ff6b6b;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255,255,255,0.5);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            border: 1px solid #2d3561;
        }
        
        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
        }
        
        .close-modal:hover {
            color: #ff6b6b;
        }
        
        .modal h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 22px;
        }
        
        .modal-detail {
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #2d3561;
        }
        
        .modal-link {
            display: inline-block;
            margin-top: 10px;
            margin-right: 15px;
            color: #667eea;
            text-decoration: none;
        }
        
        .modal-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Каталог медиафайлов</h1>
        
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по названию, жанру, актерам, режиссеру...">
            <div class="filters">
                <select id="genreFilter">
                    <option value="">Все жанры</option>
                </select>
                <select id="yearFilter">
                    <option value="">Все годы</option>
                </select>
            </div>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка каталога...
            </div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ВАША ССЫЛКА
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3Ima7Qye4NmVP1jMRk95erowQHhMDT9srmIFAqq-ErrUc3aAEyfhnE8rKmEhfjrc3xi96bqGcCJ/pub?output=csv';
        
        let allMovies = [];
        let uniqueGenres = new Set();
        let uniqueYears = new Set();
        
        async function loadMovies() {
            const contentDiv = document.getElementById('content');
            
            try {
                console.log('Загрузка...');
                
                const response = await fetch(GOOGLE_SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const csvText = await response.text();
                console.log('Получено символов:', csvText.length);
                
                const rows = parseCSV(csvText);
                console.log('Строк в CSV:', rows.length);
                
                if (rows.length < 2) throw new Error('Нет данных');
                
                // Показываем первые 3 заголовка для отладки
                console.log('Заголовки:', rows[0]);
                
                // Ищем индексы колонок (проверяем первые 10 строк для отладки)
                const headers = rows[0];
                let titleIndex = -1;
                let yearIndex = -1;
                let genreIndex = -1;
                let ratingIndex = -1;
                let directorIndex = -1;
                let actorsIndex = -1;
                let descriptionIndex = -1;
                let countryIndex = -1;
                
                // Ищем нужные колонки по разным вариантам названий
                for (let i = 0; i < headers.length; i++) {
                    const h = headers[i].toLowerCase();
                    console.log(`Колонка ${i}: "${headers[i]}"`);
                    
                    if (h.includes('название') || h.includes('title') || h.includes('фильм')) {
                        titleIndex = i;
                        console.log(`→ Найдено название в колонке ${i}`);
                    }
                    if (h.includes('год') || h.includes('year') || h.includes('дата')) {
                        yearIndex = i;
                        console.log(`→ Найдены год в колонке ${i}`);
                    }
                    if (h.includes('жанр') || h.includes('genre')) {
                        genreIndex = i;
                        console.log(`→ Найден жанр в колонке ${i}`);
                    }
                    if (h.includes('рейтинг') || h.includes('rating') || h.includes('оценка')) {
                        ratingIndex = i;
                        console.log(`→ Найден рейтинг в колонке ${i}`);
                    }
                    if (h.includes('режисс') || h.includes('director')) {
                        directorIndex = i;
                        console.log(`→ Найден режиссер в колонке ${i}`);
                    }
                    if (h.includes('актер') || h.includes('actor') || h.includes('в ролях')) {
                        actorsIndex = i;
                        console.log(`→ Найдены актеры в колонке ${i}`);
                    }
                    if (h.includes('описан') || h.includes('description') || h.includes('сюжет')) {
                        descriptionIndex = i;
                        console.log(`→ Найдено описание в колонке ${i}`);
                    }
                    if (h.includes('стран') || h.includes('country')) {
                        countryIndex = i;
                        console.log(`→ Найдена страна в колонке ${i}`);
                    }
                }
                
                // Если не нашли название, берем первую колонку
                if (titleIndex === -1 && headers.length > 0) {
                    titleIndex = 0;
                    console.log('→ Используем первую колонку как название');
                }
                
                // Парсим данные
                allMovies = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length === 0) continue;
                    
                    let title = titleIndex !== -1 && titleIndex < row.length ? row[titleIndex]?.trim() : '';
                    if (!title && row.length > 0) title = row[0]?.trim();
                    if (!title) continue;
                    
                    const movie = {
                        title: title,
                        year: yearIndex !== -1 && yearIndex < row.length ? row[yearIndex]?.trim() : '',
                        genre: genreIndex !== -1 && genreIndex < row.length ? row[genreIndex]?.trim() : '',
                        rating: ratingIndex !== -1 && ratingIndex < row.length ? row[ratingIndex]?.trim() : '',
                        director: directorIndex !== -1 && directorIndex < row.length ? row[directorIndex]?.trim() : '',
                        actors: actorsIndex !== -1 && actorsIndex < row.length ? row[actorsIndex]?.trim() : '',
                        description: descriptionIndex !== -1 && descriptionIndex < row.length ? row[descriptionIndex]?.trim() : '',
                        country: countryIndex !== -1 && countryIndex < row.length ? row[countryIndex]?.trim() : '',
                        // Сохраняем все данные для модального окна
                        rawData: row
                    };
                    
                    allMovies.push(movie);
                    
                    // Собираем жанры
                    if (movie.genre) {
                        movie.genre.split(/[,;\/]/).forEach(g => {
                            const genre = g.trim();
                            if (genre && genre !== '—' && genre !== '-') {
                                uniqueGenres.add(genre);
                            }
                        });
                    }
                    
                    // Собираем года
                    if (movie.year && movie.year !== '—' && movie.year !== '-') {
                        uniqueYears.add(movie.year);
                    }
                }
                
                console.log('Загружено фильмов:', allMovies.length);
                console.log('Пример первого фильма:', allMovies[0]);
                
                if (allMovies.length === 0) {
                    throw new Error('Не найдено фильмов');
                }
                
                // Заполняем фильтры
                const genreSelect = document.getElementById('genreFilter');
                genreSelect.innerHTML = '<option value="">Все жанры</option>';
                Array.from(uniqueGenres).sort().forEach(genre => {
                    genreSelect.innerHTML += `<option value="${escapeHtml(genre)}">${escapeHtml(genre)}</option>`;
                });
                
                const yearSelect = document.getElementById('yearFilter');
                yearSelect.innerHTML = '<option value="">Все годы</option>';
                Array.from(uniqueYears).sort((a,b) => parseInt(b) - parseInt(a)).forEach(year => {
                    yearSelect.innerHTML += `<option value="${escapeHtml(year)}">${escapeHtml(year)}</option>`;
                });
                
                displayMovies(allMovies);
                
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${escapeHtml(error.message)}<br><br>
                        <strong>Проверьте в консоли (F12):</strong><br>
                        • Откройте вкладку Console<br>
                        • Посмотрите какие колонки найдены<br>
                        • Убедитесь что таблица опубликована
                    </div>
                `;
            }
        }
        
        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;
            
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !inQuotes) {
                    if (char === '\r') i++;
                    currentRow.push(currentField);
                    if (currentRow.length > 0) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.length > 0) {
                    rows.push(currentRow);
                }
            }
            
            return rows;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showMovieDetails(movie) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            let detailsHtml = `<h3>${escapeHtml(movie.title)}</h3>`;
            
            if (movie.year) detailsHtml += `<div class="modal-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(movie.year)}</div>`;
            if (movie.country) detailsHtml += `<div class="modal-detail"><span class="movie-label">🌍 Страна:</span> ${escapeHtml(movie.country)}</div>`;
            if (movie.genre) detailsHtml += `<div class="modal-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre)}</div>`;
            if (movie.director) detailsHtml += `<div class="modal-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director)}</div>`;
            if (movie.actors) detailsHtml += `<div class="modal-detail"><span class="movie-label">⭐ Актеры:</span> ${escapeHtml(movie.actors)}</div>`;
            if (movie.rating) detailsHtml += `<div class="modal-detail"><span class="movie-label">📊 Рейтинг:</span> ${escapeHtml(movie.rating)}</div>`;
            if (movie.description) detailsHtml += `<div class="modal-detail"><span class="movie-label">📖 Описание:</span> ${escapeHtml(movie.description)}</div>`;
            
            modalBody.innerHTML = detailsHtml;
            modal.style.display = 'flex';
        }
        
        function displayMovies(movies) {
            const contentDiv = document.getElementById('content');
            const statsDiv = document.getElementById('stats');
            
            statsDiv.innerHTML = `📊 Найдено: ${movies.length} фильмов`;
            
            if (movies.length === 0) {
                contentDiv.innerHTML = '<div class="no-results">😔 Ничего не найдено</div>';
                return;
            }
            
            const moviesHtml = `
                <div class="movies-grid">
                    ${movies.map(movie => `
                        <div class="movie-card" onclick='showMovieDetails(${JSON.stringify(movie).replace(/'/g, "\\'")})'>
                            <div class="movie-info">
                                <div class="movie-title">🎬 ${escapeHtml(movie.title.length > 50 ? movie.title.substring(0, 50) + '...' : movie.title)}</div>
                                ${movie.year ? `<div class="movie-detail"><span class="movie-label">📅 Год:</span> ${escapeHtml(movie.year)}</div>` : ''}
                                ${movie.genre ? `<div class="movie-detail"><span class="movie-label">🎭 Жанр:</span> ${escapeHtml(movie.genre.length > 50 ? movie.genre.substring(0, 50) + '...' : movie.genre)}</div>` : ''}
                                ${movie.rating ? `<div class="movie-detail"><span class="movie-label">⭐ Рейтинг:</span> ${escapeHtml(movie.rating)}</div>` : ''}
                                ${movie.director ? `<div class="movie-detail"><span class="movie-label">🎬 Режиссер:</span> ${escapeHtml(movie.director.length > 40 ? movie.director.substring(0, 40) + '...' : movie.director)}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            contentDiv.innerHTML = moviesHtml;
        }
        
        function filterMovies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedGenre = document.getElementById('genreFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            
            const filtered = allMovies.filter(movie => {
                const searchFields = [
                    movie.title,
                    movie.genre,
                    movie.actors,
                    movie.director,
                    movie.description
                ].join(' ').toLowerCase();
                
                const matchesSearch = !searchTerm || searchFields.includes(searchTerm);
                
                let matchesGenre = !selectedGenre;
                if (selectedGenre && !matchesGenre) {
                    const movieGenres = (movie.genre || '').split(/[,;\/]/).map(g => g.trim());
                    matchesGenre = movieGenres.includes(selectedGenre);
                }
                
                const matchesYear = !selectedYear || movie.year === selectedYear;
                
                return matchesSearch && matchesGenre && matchesYear;
            });
            
            displayMovies(filtered);
        }
        
        // Обработчики
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterMovies, 300);
        });
        document.getElementById('genreFilter').addEventListener('change', filterMovies);
        document.getElementById('yearFilter').addEventListener('change', filterMovies);
        
        // Модальное окно
        const modal = document.getElementById('modal');
        document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (event) => {
            if (event.target === modal) modal.style.display = 'none';
        };
        
        loadMovies();
    </script>
</body>
</html>
