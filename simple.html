<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог медиафайлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
        }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; }
        .info { text-align: center; margin-bottom: 30px; color: #8d96a0; }
        .movies-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .movie-item {
            background: #161b22;
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #3d444d;
        }
        .movie-title { font-weight: bold; color: #58a6ff; }
        .movie-details { font-size: 13px; color: #8d96a0; margin-top: 5px; }
        .error { text-align: center; padding: 40px; background: #da36331a; border-radius: 12px; color: #f85149; }
    </style>
</head>
<body>
    <h1>🎬 Каталог медиафайлов</h1>
    <div class="info">Загрузка списка фильмов...</div>
    <div id="content" class="movies-list"></div>

    <script>
        // Минимальный скрипт — без сложных операций
        (async function() {
            try {
                const response = await fetch('./movies.json');
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                const movies = data.movies;
                
                document.querySelector('.info').innerHTML = `📊 Загружено ${movies.length} фильмов`;
                
                let html = '';
                for (let i = 0; i < movies.length && i < 100; i++) {  // Только первые 100 фильмов!
                    const m = movies[i];
                    html += `
                        <div class="movie-item">
                            <div class="movie-title">${escape(m.title)}</div>
                            <div class="movie-details">
                                ${m.year ? `📅 ${m.year} | ` : ''}
                                ${m.director ? `🎬 ${escape(m.director)}` : ''}
                                ${m.genre ? `<br>🎭 ${escape(m.genre).substring(0, 80)}` : ''}
                            </div>
                        </div>
                    `;
                }
                
                if (movies.length > 100) {
                    html += `<div class="movie-item" style="text-align:center">... и ещё ${movies.length - 100} фильмов. Для полного списка нужна оптимизация.</div>`;
                }
                
                document.getElementById('content').innerHTML = html;
                
            } catch(e) {
                document.getElementById('content').innerHTML = `<div class="error">❌ Ошибка: ${e.message}</div>`;
            }
            
            function escape(str) {
                if (!str) return '';
                return String(str).replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
        })();
    </script>
</body>
</html>
