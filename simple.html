<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог фильмов</title>
    <style>
        body { font-family: Arial; background: #0d1117; color: white; padding: 20px; }
        .card { background: #161b22; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .title { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Каталог медиафайлов</h1>
    <div id="list">Загрузка...</div>

    <script>
        fetch('./movies.json')
            .then(r => r.json())
            .then(data => {
                let html = '';
                for (let m of data.movies.slice(0, 50)) {
                    html += `<div class="card">
                        <div class="title">${m.title || 'Без названия'}</div>
                        <div>${m.year || '—'} | ${m.director || '—'}</div>
                        <div>${m.genre || '—'}</div>
                    </div>`;
                }
                document.getElementById('list').innerHTML = html + `<p>... и ещё ${data.movies.length - 50} фильмов</p>`;
            })
            .catch(err => {
                document.getElementById('list').innerHTML = 'Ошибка: ' + err.message;
            });
    </script>
</body>
</html>
